<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Créer mon mot de passe</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    body { background: var(--bg-subtle, #f3f4f6); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .activation-card { background: var(--surface); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px 36px; max-width: 420px; width: 100%; }
    .logo { font-size: 22px; font-weight: 800; color: var(--primary, #16a34a); margin-bottom: 8px; }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .err-box { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; color: #b91c1c; font-size: 13px; padding: 10px 14px; margin-bottom: 16px; display: none; }
    .success-box { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; color: #166534; font-size: 14px; padding: 14px 16px; text-align: center; display: none; }
  </style>
</head>
<body>
<div class="activation-card">
  <div class="logo">UnioNova</div>
  <div class="title">Créer votre mot de passe</div>
  <div class="subtitle">Votre adhésion a été approuvée. Définissez un mot de passe pour accéder à votre espace membre.</div>

  <div class="err-box" id="err-box"></div>

  <div id="form-section">
    <div class="form-group">
      <label class="form-label">Mot de passe *</label>
      <input type="password" class="form-input" id="password" placeholder="6 à 20 caractères"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe *</label>
      <input type="password" class="form-input" id="confirm" placeholder="Répétez le mot de passe"/>
    </div>
    <button class="btn btn-primary" id="btn-activer" style="width:100%;margin-top:8px;">Activer mon compte</button>
  </div>

  <div class="success-box" id="success-box">
    Votre compte est activé !<br/>
    <a href="/login.html" class="btn btn-primary" style="display:inline-block;margin-top:16px;">Se connecter</a>
  </div>
</div>

<button id="btn-theme" class="btn-theme-float" title="Mode nuit">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<script type="module">
  import { api } from '/src/js/api.js'
  import { initTheme } from '/src/js/theme.js'
  import { initTraductionAuto } from '/src/js/translator.js'

  initTheme()
  initTraductionAuto()

  const params = new URLSearchParams(window.location.search)
  const token = params.get('token')

  if (!token) {
    document.getElementById('err-box').textContent = 'Lien invalide. Vérifiez l\'email reçu.'
    document.getElementById('err-box').style.display = 'block'
    document.getElementById('form-section').style.display = 'none'
  }

  document.getElementById('btn-activer').addEventListener('click', async () => {
    const password = document.getElementById('password').value
    const confirm = document.getElementById('confirm').value
    const err = document.getElementById('err-box')

    err.style.display = 'none'

    if (!password || password.length < 6) {
      err.textContent = 'Le mot de passe doit contenir au moins 6 caractères.'
      err.style.display = 'block'
      return
    }
    if (password !== confirm) {
      err.textContent = 'Les mots de passe ne correspondent pas.'
      err.style.display = 'block'
      return
    }

    const btn = document.getElementById('btn-activer')
    btn.disabled = true
    btn.textContent = 'Activation...'

    try {
      await api.post('/compte/activer-adhesion', { token, password })
      document.getElementById('form-section').style.display = 'none'
      document.getElementById('success-box').style.display = 'block'
    } catch (e) {
      err.textContent = e.message || 'Une erreur est survenue.'
      err.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Activer mon compte'
    }
  })
</script>
</body>
</html>
