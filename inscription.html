<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Inscription</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg); }

    /* NAVBAR */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 48px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 800; color: var(--primary);
      text-decoration: none;
    }
    .navbar-brand-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; overflow: hidden;
    }
    .navbar-actions { display: flex; gap: 10px; align-items: center; }
    .nav-link-btn { padding:7px 16px; background:var(--surface); border:1.5px solid var(--border); color:var(--text); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:border-color .15s, color .15s; }
    .nav-link-btn:hover { border-color:var(--primary); color:var(--primary); }
    .nav-primary-btn { padding:7px 16px; background:var(--primary); color:white; border-radius:8px; font-size:13px; font-weight:700; border:none; cursor:pointer; transition:background .15s; }
    .nav-primary-btn:hover { background:var(--primary-dark); }
    .reg-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }

    .reg-wrapper {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.1);
      width: 100%;
      max-width: 520px;
      padding: 40px;
    }

    .reg-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
    .reg-brand-logo { font-size: 20px; font-weight: 800; color: var(--primary); }

    .reg-title { font-size: 20px; font-weight: 700; }
    .reg-subtitle { font-size: 13.5px; color: var(--text-muted); margin-bottom: 28px; margin-top: 2px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .reg-error {
      background: #fee2e2; color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .reg-error.show { display: block; }

    .reg-success {
      background: #dcfce7; color: #15803d;
      border-radius: var(--radius-sm);
      padding: 14px; font-size: 13.5px;
      text-align: center; display: none;
    }
    .reg-success.show { display: block; }

    .btn-register {
      width: 100%; padding: 11px;
      background: var(--primary); color: white;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      transition: background .15s;
    }
    .btn-register:hover { background: var(--primary-dark); }
    .btn-register:disabled { opacity: .6; cursor: not-allowed; }

    .reg-login { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .reg-login a { color: var(--primary); font-weight: 600; }

    select.form-input { appearance: none; cursor: pointer; }

    /* ── RESPONSIVE MOBILE < 640px ── */
    @media (max-width: 639px) {
      .navbar { padding: 10px 16px; }
      .nav-link-btn { display: none; }
      .nav-primary-btn { font-size: 12px; padding: 6px 12px; }
      .reg-center { padding: 16px; align-items: flex-start; }
      .reg-wrapper { padding: 24px 16px; border-radius: 14px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" href="/accueil.html">
    <div class="navbar-brand-icon" id="nav-brand-icon">A</div>
    <span id="nav-brand-nom"><span style="color:#2E7D32">Unio</span><span style="color:#1e2530">Nova</span></span>
  </a>
  <div class="navbar-actions">
    <button id="btn-theme" class="topbar-icon-btn" title="Mode nuit">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="nav-link-btn" onclick="window.location.href='/accueil.html'">Accueil</button>
    <button class="nav-primary-btn" onclick="window.location.href='/login.html'">Se connecter</button>
  </div>
</nav>

<div class="reg-center">
<div class="reg-wrapper">
  <div class="reg-brand">
    <span class="reg-brand-logo">UnioNova</span>
  </div>

  <div class="reg-title">Créer un compte</div>
  <div class="reg-subtitle">Rejoignez la plateforme de gestion communautaire</div>

  <div class="reg-error" id="reg-error"></div>
  <div class="reg-success" id="reg-success">
    ✅ Compte créé avec succès ! Vérifiez votre email pour activer votre compte.
  </div>

  <form id="reg-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nom *</label>
        <input type="text" class="form-input" id="nom" placeholder="Kouassi" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Prénom *</label>
        <input type="text" class="form-input" id="prenom" placeholder="Yannick" required/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Email *</label>
      <input type="email" class="form-input" id="email" placeholder="vous@exemple.com" required/>
    </div>

    <div class="form-group">
      <label class="form-label">Date de naissance *</label>
      <input type="date" class="form-input" id="dateNaissance" required/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Sexe *</label>
        <select class="form-input" id="libSexe" required>
          <option value="">Choisir</option>
          <option value="1">Masculin</option>
          <option value="2">Féminin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Situation matrimoniale *</label>
        <select class="form-input" id="situationMatrimoniale" required>
          <option value="">Choisir</option>
          <option value="1">Célibataire</option>
          <option value="2">Marié(e)</option>
          <option value="3">Divorcé(e)</option>
          <option value="4">Veuf/Veuve</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Mot de passe *</label>
        <input type="password" class="form-input" id="password" placeholder="6 à 10 caractères" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer *</label>
        <input type="password" class="form-input" id="confirmPassword" placeholder="••••••" required/>
      </div>
    </div>

    <button type="submit" class="btn-register" id="btn-reg">Créer mon compte</button>
  </form>

  <div class="reg-login">
    Déjà un compte ? <a href="/login.html">Se connecter</a>
  </div>
</div>
</div><!-- /reg-center -->

<script type="module">
  import { api } from '/src/js/api.js'
  import { initTheme } from '/src/js/theme.js'
  import { initTraductionAuto } from '/src/js/translator.js'

  initTheme()
  initTraductionAuto()

  const API_BASE = window.location.hostname !== 'localhost' ? 'https://ataabo-api-production.up.railway.app/api' : '/api'
  fetch(`${API_BASE}/plateforme`).then(r => r.ok ? r.json() : null).then(p => {
    if (!p) return
    const iconEl = document.getElementById('nav-brand-icon')
    const nomEl = document.getElementById('nav-brand-nom')
    if (p.urlLogoPlateforme && iconEl) iconEl.innerHTML = `<img src="${p.urlLogoPlateforme}" style="width:100%;height:100%;object-fit:contain;border-radius:6px;" onerror="this.parentElement.textContent='A'">`
    if (p.nomPlateforme && nomEl) { const nom = p.nomPlateforme; const mid = Math.ceil(nom.length / 2); nomEl.innerHTML = `<span style="color:#2E7D32">${nom.slice(0,mid)}</span><span style="color:#1e2530">${nom.slice(mid)}</span>` }
  }).catch(() => {})

  const form = document.getElementById('reg-form')
  const errorEl = document.getElementById('reg-error')
  const successEl = document.getElementById('reg-success')
  const btn = document.getElementById('btn-reg')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    errorEl.classList.remove('show')
    btn.disabled = true
    btn.textContent = 'Création...'

    const data = {
      nom: document.getElementById('nom').value,
      prenom: document.getElementById('prenom').value,
      email: document.getElementById('email').value,
      dateNaissance: document.getElementById('dateNaissance').value,
      libSexe: document.getElementById('libSexe').value,
      situationMatrimoniale: document.getElementById('situationMatrimoniale').value,
      password: document.getElementById('password').value,
      confirmPassword: document.getElementById('confirmPassword').value,
    }

    try {
      await api.post('/inscription', data)
      form.style.display = 'none'
      successEl.classList.add('show')
    } catch (err) {
      errorEl.textContent = err.message
      errorEl.classList.add('show')
      btn.disabled = false
      btn.textContent = 'Créer mon compte'
    }
  })
</script>
</body>
</html>
