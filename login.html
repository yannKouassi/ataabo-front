<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Connexion</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }

    .login-wrapper {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.12);
    }

    .login-left {
      flex: 1;
      background: var(--primary);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
    }

    .login-brand { display: flex; align-items: center; gap: 10px; }
    .login-brand-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px;
    }
    .login-brand-name { font-size: 22px; font-weight: 700; }

    .login-tagline { font-size: 28px; font-weight: 700; line-height: 1.3; }
    .login-tagline span { opacity: .7; font-weight: 400; font-size: 15px; display: block; margin-top: 8px; }

    .login-countries {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .country-chip {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .login-right {
      flex: 1;
      background: white;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-subtitle { font-size: 13.5px; color: var(--text-muted); margin-bottom: 32px; }

    .login-error {
      background: #fee2e2;
      color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-error.show { display: block; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .login-register {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-register a { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <!-- Gauche décorative -->
  <div class="login-left">
    <div class="login-brand">
      <div class="login-brand-icon">A</div>
      <span class="login-brand-name">Ataabo</span>
    </div>

    <div>
      <div class="login-tagline">
        Gérez vos organisations communautaires
        <span>Associations · Mutuelles · ONG</span>
      </div>
    </div>

    <div class="login-countries">
      <span class="country-chip">🇨🇮 Côte d'Ivoire</span>
      <span class="country-chip">🇧🇯 Bénin</span>
      <span class="country-chip">🇲🇱 Mali</span>
      <span class="country-chip">🇳🇬 Nigeria</span>
      <span class="country-chip">🇲🇬 Madagascar</span>
    </div>
  </div>

  <!-- Droite formulaire -->
  <div class="login-right">
    <div class="login-title">Bon retour 👋</div>
    <div class="login-subtitle">Connectez-vous à votre espace</div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-input" id="email" placeholder="vous@exemple.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span id="btn-text">Se connecter</span>
      </button>
    </form>

    <div class="login-register">
      Pas encore de compte ?
      <a href="/adhesion.html">Créer un compte</a>
    </div>
  </div>
</div>

<script type="module">
  import { saveLogin, isLoggedIn } from '/src/js/auth.js'
  import { api } from '/src/js/api.js'

  // Rediriger si déjà connecté
  if (isLoggedIn()) window.location.href = '/choisir-org.html'

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('btn-login')
    const errorEl = document.getElementById('login-error')
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    btn.disabled = true
    document.getElementById('btn-text').textContent = 'Connexion...'
    errorEl.classList.remove('show')

    try {
      const data = await api.post('/connexion', { email, password })
      saveLogin(data)
      window.location.href = '/choisir-org.html'
    } catch (err) {
      errorEl.textContent = err.message
      errorEl.classList.add('show')
      btn.disabled = false
      document.getElementById('btn-text').textContent = 'Se connecter'
    }
  })
</script>
</body>
</html>
