<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Connexion</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg); }

    /* NAVBAR */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 48px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 800; color: var(--primary);
      text-decoration: none; cursor: pointer;
    }
    .navbar-brand-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; overflow: hidden;
      background: var(--primary-light); color: var(--primary);
      border: 1px solid rgba(46,125,50,.2);
    }
    .navbar-actions { display: flex; gap: 10px; align-items: center; }
    .nav-btn-outline {
      padding: 8px 18px; background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text); border-radius: 8px; font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .nav-btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .nav-btn-primary {
      padding: 8px 18px; background: var(--primary); color: white;
      border-radius: 8px; font-size: 13.5px; font-weight: 700;
      border: none; cursor: pointer; transition: background .15s;
    }
    .nav-btn-primary:hover { background: var(--primary-dark); }

    .navbar-hamburger {
      display: none;
      width: 38px; height: 38px;
      border-radius: 8px;
      align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text);
      flex-shrink: 0;
    }
    .navbar-hamburger:hover { background: var(--surface-hover, rgba(0,0,0,.04)); }

    .navbar-mobile-menu {
      display: none;
      position: fixed;
      top: 61px; left: 0; right: 0; z-index: 199;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .navbar-mobile-menu.open { display: flex; }
    .navbar-mobile-menu .nav-btn-outline,
    .navbar-mobile-menu .nav-btn-primary { width: 100%; text-align: center; }

    .login-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }

    .login-wrapper {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.12);
    }

    .login-left {
      flex: 1;
      background: var(--primary);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
    }

    .login-brand { display: flex; align-items: center; gap: 10px; }
    .login-brand-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px;
    }
    .login-brand-name { font-size: 22px; font-weight: 700; }

    .login-tagline { font-size: 28px; font-weight: 700; line-height: 1.3; }
    .login-tagline span { opacity: .7; font-weight: 400; font-size: 15px; display: block; margin-top: 8px; }

    .login-countries {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .country-chip {
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      color: white;
      transition: background .15s;
    }
    .country-chip:hover, .country-chip-actif { background: rgba(255,255,255,.35); }

    .login-right {
      flex: 1;
      background: var(--surface);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-subtitle { font-size: 13.5px; color: var(--text-muted); margin-bottom: 32px; }

    .login-error {
      background: #fee2e2;
      color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-error.show { display: block; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .login-register {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .login-register a { color: var(--primary); font-weight: 600; }

    /* ── RESPONSIVE MOBILE < 640px ── */
    @media (max-width: 639px) {
      .navbar { padding: 10px 16px; }
      .navbar-hamburger { display: flex; }
      .login-center { padding: 0; align-items: flex-start; }
      .login-wrapper {
        flex-direction: column;
        border-radius: 0;
        box-shadow: none;
        min-height: calc(100vh - 53px);
      }
      /* Panneau gauche : compact, réduit à une bande logo+titre */
      .login-left {
        padding: 24px 20px;
        flex: none;
        justify-content: flex-start;
        gap: 8px;
      }
      .login-tagline { font-size: 20px; }
      .login-countries { display: none; }
      /* Panneau droit : le formulaire prend le reste */
      .login-right { flex: 1; padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" href="/accueil.html">
    <div class="navbar-brand-icon" id="nav-brand-icon">A</div>
    <span id="nav-brand-nom"><span style="color:#2E7D32">Unio</span><span style="color:var(--text)">Nova</span></span>
  </a>
  <div class="navbar-actions">
    <button id="btn-theme" class="nav-btn-outline" title="Mode nuit">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="btn-nav-accueil" class="nav-btn-outline" onclick="window.location.href='/accueil.html'">Accueil</button>
    <button id="btn-nav-creer-compte" class="nav-btn-primary" onclick="window.location.href='/adhesion.html'">Créer un compte</button>
    <button class="navbar-hamburger" id="navbar-hamburger" aria-label="Menu" type="button">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<div class="navbar-mobile-menu" id="navbar-mobile-menu"></div>

<div class="login-center">
<div class="login-wrapper">
  <!-- Gauche décorative -->
  <div class="login-left">
    <a class="login-brand" href="/accueil.html" style="text-decoration:none;color:inherit;">
      <div class="login-brand-icon">A</div>
      <span class="login-brand-name"><span style="color:#ffffff">Unio</span><span style="color:rgba(255,255,255,0.6)">Nova</span></span>
    </a>

    <div>
      <div class="login-tagline">
        <span data-i18n="LOGIN_TAGLINE">Gérez vos organisations communautaires</span>
        <span>Associations · Mutuelles · ONG</span>
      </div>
    </div>

    <div class="login-countries" id="login-countries"></div>
  </div>

  <!-- Droite formulaire -->
  <div class="login-right">
    <div class="login-title" data-i18n="LOGIN_TITRE">Bon retour</div>
    <div class="login-subtitle" data-i18n="LOGIN_SOUS_TITRE">Connectez-vous à votre espace</div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-input" id="email" placeholder="vous@exemple.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required/>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span id="btn-text" data-i18n="LOGIN_BTN">Se connecter</span>
      </button>
    </form>

    <div class="login-register">
      Pas encore de compte ?
      <a href="/adhesion.html">Créer un compte</a>
    </div>
  </div>
</div>
</div><!-- /login-center -->

<script type="module">
  import { saveLogin, isLoggedIn } from '/src/js/auth.js'
  import { api } from '/src/js/api.js'
  import { chargerTraductions, appliquerTraductions, chargerPaysLangues } from '/src/js/i18n.js'
  import { initTheme } from '/src/js/theme.js'
  import { initTraductionAuto } from '/src/js/translator.js'

  // Menu mobile (hamburger) — câblé en tout premier, avant tout appel réseau.
  const navbarActions = document.querySelector('.navbar-actions')
  const menuMobile = document.getElementById('navbar-mobile-menu')
  const btnHamburger = document.getElementById('navbar-hamburger')
  const controlesRepositionnables = [
    document.getElementById('btn-theme'),
    document.getElementById('btn-nav-accueil'),
    document.getElementById('btn-nav-creer-compte')
  ]
  const mqMobile = window.matchMedia('(max-width: 639px)')
  function ajusterNavbarMobile(e) {
    const estMobile = e ? e.matches : mqMobile.matches
    controlesRepositionnables.forEach(el => {
      if (!el) return
      if (estMobile && el.parentElement !== menuMobile) menuMobile.appendChild(el)
      else if (!estMobile && el.parentElement !== navbarActions) navbarActions.insertBefore(el, btnHamburger)
    })
  }
  ajusterNavbarMobile()
  mqMobile.addEventListener('change', ajusterNavbarMobile)

  window.fermerMenuMobile = () => menuMobile.classList.remove('open')
  btnHamburger.addEventListener('click', (e) => {
    e.stopPropagation()
    menuMobile.classList.toggle('open')
  })
  document.addEventListener('click', (e) => {
    if (!menuMobile.contains(e.target) && e.target !== btnHamburger) fermerMenuMobile()
  })

  initTheme()

  // Logo plateforme dans la navbar
  const API_BASE = window.location.hostname !== 'localhost' ? 'https://ataabo-api-production.up.railway.app/api' : '/api'
  fetch(`${API_BASE}/plateforme`).then(r => r.ok ? r.json() : null).then(p => {
    if (!p) return
    const iconEl = document.getElementById('nav-brand-icon')
    const nomEl = document.getElementById('nav-brand-nom')
    if (p.urlLogoPlateforme && iconEl) {
      iconEl.innerHTML = `<img src="${p.urlLogoPlateforme}" style="width:100%;height:100%;object-fit:contain;border-radius:6px;" onerror="this.parentElement.textContent='A'">`
    }
    if (p.nomPlateforme && nomEl) {
      const nom = p.nomPlateforme
      const mid = Math.ceil(nom.length / 2)
      nomEl.innerHTML = `<span style="color:#2E7D32">${nom.slice(0, mid)}</span><span style="color:var(--text)">${nom.slice(mid)}</span>`
    }
  }).catch(() => {})
  await chargerTraductions()
  appliquerTraductions()
  initTraductionAuto()

  const paysList = await chargerPaysLangues()
  document.getElementById('login-countries').innerHTML = paysList.map(p =>
    `<span class="country-chip">${p.libPays}</span>`
  ).join('')

  // Rediriger si déjà connecté
  if (isLoggedIn()) window.location.href = '/choisir-org.html'

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('btn-login')
    const errorEl = document.getElementById('login-error')
    const email = document.getElementById('email').value
    const password = document.getElementById('password').value

    btn.disabled = true
    document.getElementById('btn-text').textContent = 'Connexion...'
    errorEl.classList.remove('show')

    try {
      const data = await api.post('/connexion', { email, password })
      saveLogin(data)
      window.location.href = '/choisir-org.html'
    } catch (err) {
      errorEl.textContent = err.message
      errorEl.classList.add('show')
      btn.disabled = false
      document.getElementById('btn-text').textContent = 'Se connecter'
    }
  })
</script>
</body>
</html>
