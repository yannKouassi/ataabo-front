<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page introuvable | UnioNova</title>
    <link rel="icon" type="image/png" href="/img.png">
    <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div class="card" style="max-width:440px; text-align:center;">
        <div class="empty-state" style="padding:0;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 16px;">
                <circle cx="12" cy="12" r="10"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
            </svg>

            <div style="font-size:48px; font-weight:700; color:var(--primary); margin-bottom:8px;">404</div>
            <div class="empty-state-title">Page introuvable</div>
            <p class="text-muted" style="margin-top:8px; margin-bottom:24px;">
                La page que vous cherchez n'existe pas ou a été déplacée.
            </p>

            <a href="/accueil.html" class="btn btn-primary" style="justify-content:center;">
                Retourner à l'accueil
            </a>
        </div>
    </div>
</div>

</body>
</html>
