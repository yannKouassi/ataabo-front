<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Groupes utilisateurs</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions"></div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <div>
        <div class="page-title">Groupes utilisateurs</div>
        <div class="page-subtitle">Gérer les rôles disponibles dans l'organisation</div>
      </div>
      <button class="btn btn-primary" id="btn-nouveau">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau groupe
      </button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Libellé</th>
              <th>Membres</th>
              <th style="width:80px;"></th>
            </tr>
          </thead>
          <tbody id="tbody-groupes">
            <tr><td colspan="4"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal nouveau groupe -->
<div class="modal-overlay" id="modal-groupe" style="display:none;">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <span class="modal-title">Nouveau groupe</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Libellé *</label>
        <input type="text" class="form-input" id="f-libelle" placeholder="Ex: Trésorier"/>
      </div>
      <div class="form-group">
        <label class="form-label">Code *</label>
        <input type="text" class="form-input" id="f-code" placeholder="Ex: GRP_TRESORIER" style="font-family:monospace;"/>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Généré automatiquement depuis le libellé. Modifiable.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-annuler">Annuler</button>
      <button class="btn btn-primary" id="btn-sauvegarder">Créer le groupe</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  // Fusionner les permissions des menus qui pointent vers cette page
  const _p1 = getPermission('/habilitations/programmes')
  const _p2 = getPermission('/organisation/params/groupes')
  const perm = {
    peutLire:      _p1.peutLire      || _p2.peutLire,
    peutEcrire:    _p1.peutEcrire    || _p2.peutEcrire,
    peutSupprimer: _p1.peutSupprimer || _p2.peutSupprimer,
  }
  if (!perm.peutEcrire) {
    document.getElementById('btn-nouveau').style.display = 'none'
  }

  const tbody = document.getElementById('tbody-groupes')

  async function charger() {
    try {
      const items = await api.get(`/utilisateurs/groupes?orgId=${encodeURIComponent(ctx.orgId)}`)
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>Aucun groupe</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(g => `
        <tr>
          <td style="font-family:monospace;font-size:12px;font-weight:600;">${g.codeGroupe||'—'}</td>
          <td style="font-weight:600;">${g.libelleGroupe||'—'}</td>
          <td><span class="badge badge-secondary">—</span></td>
          <td>
            ${g.codeGroupe === 'GRP_ADMIN_PLATEFORME' || !perm.peutSupprimer ? '' : `
            <button class="btn btn-ghost" style="padding:4px 8px;color:#dc2626;" data-code="${g.codeGroupe}" title="Supprimer">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>`}
          </td>
        </tr>
      `).join('')

      tbody.querySelectorAll('[data-code]').forEach(btn => {
        btn.addEventListener('click', () => supprimerGroupe(btn.dataset.code, btn.closest('tr').querySelector('td:nth-child(2)').textContent))
      })
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:#b91c1c;padding:20px;">Erreur : ${err.message}</td></tr>`
    }
  }

  async function supprimerGroupe(code, libelle) {
    if (!confirm(`Supprimer le groupe "${libelle}" ?\nLes membres de ce groupe perdront leur accès.`)) return
    try {
      await api.delete(`/utilisateurs/groupes/${code}?orgId=${encodeURIComponent(ctx.orgId)}`)
      toast.success('Groupe supprimé.')
      charger()
    } catch(err) {
      toast.error(err.message)
    }
  }

  // Auto-générer le code depuis le libellé
  document.getElementById('f-libelle').addEventListener('input', e => {
    const code = 'GRP_' + e.target.value.toUpperCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^A-Z0-9]+/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '')
    document.getElementById('f-code').value = code
  })

  document.getElementById('btn-nouveau').addEventListener('click', () => {
    document.getElementById('f-libelle').value = ''
    document.getElementById('f-code').value = ''
    document.getElementById('modal-groupe').style.display = 'flex'
  })
  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-groupe').style.display = 'none'
  })
  document.getElementById('btn-annuler').addEventListener('click', () => {
    document.getElementById('modal-groupe').style.display = 'none'
  })

  document.getElementById('btn-sauvegarder').addEventListener('click', async () => {
    const libelle = document.getElementById('f-libelle').value.trim()
    const code = document.getElementById('f-code').value.trim()
    if (!libelle || !code) return toast.warning('Remplissez tous les champs.')
    const btn = document.getElementById('btn-sauvegarder')
    btn.disabled = true; btn.textContent = 'Création...'
    try {
      await api.post(`/utilisateurs/groupes?orgId=${encodeURIComponent(ctx.orgId)}`, { codeGroupe: code, libelleGroupe: libelle })
      toast.success('Groupe créé !')
      document.getElementById('modal-groupe').style.display = 'none'
      charger()
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false; btn.textContent = 'Créer le groupe'
    }
  })

  charger()
</script>
</body>
</html>
