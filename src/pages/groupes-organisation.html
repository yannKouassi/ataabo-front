<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Groupes utilisateurs</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Groupes utilisateurs</div>
      <div class="page-subtitle">Rôles disponibles dans l'organisation</div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Libellé</th>
              <th>Membres</th>
            </tr>
          </thead>
          <tbody id="tbody-groupes">
            <tr><td colspan="3"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('topbar-name').textContent = `${user.prenom} ${user.nom}`
  document.getElementById('topbar-avatar').textContent = ((user.prenom?.[0]||'')+(user.nom?.[0]||'')).toUpperCase()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const tbody = document.getElementById('tbody-groupes')

  async function charger() {
    try {
      const items = await api.get('/utilisateurs/groupes')
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><p>Aucun groupe</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(g => `
        <tr>
          <td style="font-family:monospace;font-size:12px;font-weight:600;">${g.codeGroupe||g.code||'—'}</td>
          <td style="font-weight:600;">${g.libelleGroupe||g.libelle||'—'}</td>
          <td><span class="badge badge-secondary">${g.nombreMembres ?? '—'} membre(s)</span></td>
        </tr>
      `).join('')
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="3" style="color:#b91c1c;padding:20px;">Erreur : ${err.message}</td></tr>`
    }
  }

  charger()
</script>
</body>
</html>
