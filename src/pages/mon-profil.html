<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Mon profil</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <script src="/qrcode.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Mon profil</div>
      <div class="page-subtitle">Gérer vos informations personnelles</div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:860px;">

      <!-- Infos personnelles -->
      <div class="card" style="padding:28px;">
        <div style="text-align:center; margin-bottom:24px;">
          <div id="profil-photo" style="width:80px;height:80px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;margin:0 auto 12px;"></div>
          <div style="font-size:16px; font-weight:700;" id="profil-nom"></div>
          <div style="font-size:13px; color:var(--text-muted);" id="profil-email"></div>
          <div style="margin-top:8px;" id="profil-role"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:0;">
          <div id="profil-infos"></div>
        </div>

        <button class="btn btn-outline" style="width:100%; margin-top:12px; justify-content:center;" id="btn-modifier">
          Modifier mes informations
        </button>
        <button class="btn btn-primary" style="width:100%; margin-top:10px; justify-content:center;" id="btn-carte">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          Imprimer ma carte de membre
        </button>
      </div>

      <!-- Changer mot de passe -->
      <div class="card" style="padding:28px;">
        <div style="font-weight:700; font-size:15px; margin-bottom:20px;">Changer le mot de passe</div>
        <div class="form-group">
          <label class="form-label">Mot de passe actuel *</label>
          <input type="password" class="form-input" id="pwd-actuel"/>
        </div>
        <div class="form-group">
          <label class="form-label">Nouveau mot de passe *</label>
          <input type="password" class="form-input" id="pwd-nouveau"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmer *</label>
          <input type="password" class="form-input" id="pwd-confirmer"/>
        </div>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" id="btn-changer-pwd">
          Changer le mot de passe
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Modal modifier profil -->
<div class="modal-overlay" id="modal-modifier" style="display:none;">
  <div class="modal" style="max-width:460px;">
    <div class="modal-header">
      <span class="modal-title">Modifier mes informations</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input type="text" class="form-input" id="f-nom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input type="text" class="form-input" id="f-prenom"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Date de naissance</label>
        <input type="date" class="form-input" id="f-naissance"/>
      </div>
      <div class="form-group">
        <label class="form-label">Photo de profil</label>
        <input type="file" class="form-input" id="f-photo" accept="image/*"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-annuler">Annuler</button>
      <button class="btn btn-primary" id="btn-sauvegarder">Sauvegarder</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, saveLogin } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  async function chargerProfil() {
    try {
      const p = await api.get('/moi/profil')
      const initiales = ((p.prenom?.[0]||'')+(p.nom?.[0]||'')).toUpperCase()
      if (p.urlPhotoDemandeur) {
        document.getElementById('profil-photo').innerHTML = `<img src="${p.urlPhotoDemandeur}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;"/>`
        // Synchroniser la photo dans localStorage pour la topbar
        const storedUser = JSON.parse(localStorage.getItem('user') || '{}')
        if (storedUser.urlPhoto !== p.urlPhotoDemandeur) {
          storedUser.urlPhoto = p.urlPhotoDemandeur
          localStorage.setItem('user', JSON.stringify(storedUser))
          buildSidebar()
        }
      } else {
        document.getElementById('profil-photo').textContent = initiales
      }
      document.getElementById('profil-nom').textContent = `${p.prenom} ${p.nom}`
      document.getElementById('profil-email').textContent = p.email
      document.getElementById('profil-role').innerHTML = `<span class="badge badge-info">${ctx.libelleGroupe || 'Membre'}</span>`

      const infos = [
        { l: 'N° adhérent', v: ctx.numAdherent },
        { l: 'Date de naissance', v: p.dateNaissance ? new Date(p.dateNaissance).toLocaleDateString('fr-FR') : null },
        { l: 'Sexe', v: p.libSexe },
        { l: 'Situation', v: p.situationMatrimoniale },
      ]
      document.getElementById('profil-infos').innerHTML = infos.map(i => `
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:13px;color:var(--text-muted);">${i.l}</span>
          <span style="font-size:13.5px;font-weight:600;">${i.v||'—'}</span>
        </div>`).join('')

      // Préremplir le formulaire de modification
      document.getElementById('f-nom').value = p.nom || ''
      document.getElementById('f-prenom').value = p.prenom || ''
      if (p.dateNaissance) document.getElementById('f-naissance').value = p.dateNaissance
    } catch(err) {
      toast.error('Erreur chargement profil : ' + err.message)
    }
  }

  document.getElementById('btn-modifier').addEventListener('click', () => {
    document.getElementById('modal-modifier').style.display = 'flex'
  })
  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-modifier').style.display = 'none'
  })
  document.getElementById('btn-annuler').addEventListener('click', () => {
    document.getElementById('modal-modifier').style.display = 'none'
  })

  document.getElementById('btn-sauvegarder').addEventListener('click', async () => {
    const btn = document.getElementById('btn-sauvegarder')
    btn.disabled = true; btn.textContent = 'Enregistrement...'
    try {
      const formData = new FormData()
      formData.append('nom', document.getElementById('f-nom').value)
      formData.append('prenom', document.getElementById('f-prenom').value)
      formData.append('dateNaissance', document.getElementById('f-naissance').value)
      const photo = document.getElementById('f-photo').files[0]
      if (photo) formData.append('photo', photo)
      const updated = await api.upload('/moi/profil', formData)
      // Mettre à jour localStorage pour que la topbar reflète les changements
      const storedUser = JSON.parse(localStorage.getItem('user') || '{}')
      storedUser.nom = updated.nom || storedUser.nom
      storedUser.prenom = updated.prenom || storedUser.prenom
      if (updated.urlPhotoDemandeur) storedUser.urlPhoto = updated.urlPhotoDemandeur
      localStorage.setItem('user', JSON.stringify(storedUser))
      // Rafraîchir la topbar immédiatement
      const initiales = ((updated.prenom?.[0]||'')+(updated.nom?.[0]||'')).toUpperCase()
      toast.success('Profil mis à jour !')
      document.getElementById('modal-modifier').style.display = 'none'
      chargerProfil()
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false; btn.textContent = 'Sauvegarder'
    }
  })

  document.getElementById('btn-changer-pwd').addEventListener('click', async () => {
    const btn = document.getElementById('btn-changer-pwd')
    const actuel = document.getElementById('pwd-actuel').value
    const nouveau = document.getElementById('pwd-nouveau').value
    const confirmer = document.getElementById('pwd-confirmer').value
    if (!actuel || !nouveau) return toast.warning('Remplissez tous les champs')
    if (nouveau !== confirmer) return toast.error('Les mots de passe ne correspondent pas')
    btn.disabled = true; btn.textContent = 'Modification...'
    try {
      await api.post('/changer-mot-de-passe', { ancienMotDePasse: actuel, nouveauMotDePasse: nouveau, confirmationMotDePasse: confirmer })
      toast.success('Mot de passe modifié !')
      document.getElementById('pwd-actuel').value = ''
      document.getElementById('pwd-nouveau').value = ''
      document.getElementById('pwd-confirmer').value = ''
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false; btn.textContent = 'Changer le mot de passe'
    }
  })

  // ── Carte de membre ───────────────────────────────────────────────────
  function flagEmoji(code3) {
    const map = { CIV:'CI', BEN:'BJ', SEN:'SN', CMR:'CM', MLI:'ML', BFA:'BF', GHA:'GH', FRA:'FR', GIN:'GN', TGO:'TG', NER:'NE', TCH:'TD', COD:'CD', MDG:'MG', CIV:'CI', USA:'US', GBR:'GB' }
    const c2 = map[(code3||'').toUpperCase()] || (code3||'').slice(0,2).toUpperCase()
    if (c2.length !== 2) return ''
    return String.fromCodePoint(...[...c2].map(c => 127397 + c.charCodeAt(0)))
  }

  function nomPays(code3, langue) {
    const mapFr = { CIV:"Côte d'Ivoire", BEN:'Bénin', SEN:'Sénégal', CMR:'Cameroun', MLI:'Mali', BFA:'Burkina Faso', GHA:'Ghana', FRA:'France', GIN:'Guinée', TGO:'Togo', NER:'Niger', TCH:'Tchad', COD:'RD Congo', MDG:'Madagascar' }
    const mapEn = { CIV:"Ivory Coast", BEN:'Benin', SEN:'Senegal', CMR:'Cameroon', MLI:'Mali', BFA:'Burkina Faso', GHA:'Ghana', FRA:'France', GIN:'Guinea', TGO:'Togo', NER:'Niger', TCH:'Chad', COD:'DR Congo', MDG:'Madagascar', NGA:'Nigeria' }
    const map = langue === 'en' ? mapEn : mapFr
    return map[(code3||'').toUpperCase()] || code3 || ''
  }

  // Langue de la carte imprimée : dérivée du pays de l'organisation (même convention que le sélecteur de pays du site)
  const PAYS_LANGUE_DEFAULT = { CIV: 'fr', BEN: 'fr', MLI: 'fr', NGA: 'en', MDG: 'fr' }
  const LABELS = {
    fr: {
      recto: 'Recto', verso: 'Verso', dateNaissance: 'Date de naissance', sexe: 'Sexe', nom: 'Nom',
      situation: 'Situation', telephone: 'Téléphone', numAdherent: 'N° adhérent', groupe: 'Groupe',
      pays: 'Pays', membreDepuis: 'Membre depuis', carteDeMembre: 'Carte de membre',
      titreCarte: 'Carte de membre', membre: 'Membre'
    },
    en: {
      recto: 'Front', verso: 'Back', dateNaissance: 'Date of birth', sexe: 'Gender', nom: 'Name',
      situation: 'Marital status', telephone: 'Phone', numAdherent: 'Member No.', groupe: 'Group',
      pays: 'Country', membreDepuis: 'Member since', carteDeMembre: 'Membership card',
      titreCarte: 'Membership card', membre: 'Member'
    }
  }
  // Valeurs d'énumérations (sexe, situation matrimoniale) : la fenêtre d'impression est un document
  // isolé sans initTraductionAuto(), donc ces libellés doivent être traduits localement comme LABELS.
  const SEXE_LABELS = {
    fr: { MASCULIN: 'Masculin', FEMININ: 'Féminin', NEUTRE: 'Neutre' },
    en: { MASCULIN: 'Male', FEMININ: 'Female', NEUTRE: 'Neutral' }
  }
  const SITUATION_LABELS = {
    fr: { CELIBATAIRE: 'Célibataire', MARIE: 'Marié(e)', DIVORCE: 'Divorcé(e)', VEUF_VEUVE: 'Veuf/Veuve' },
    en: { CELIBATAIRE: 'Single', MARIE: 'Married', DIVORCE: 'Divorced', VEUF_VEUVE: 'Widowed' }
  }
  // "Administrateur Organisation" (GRP_ADMIN_ORG) est un groupe système commun à toutes les
  // organisations ; les groupes personnalisés restent en texte libre saisi par l'organisation.
  const GROUPE_ADMIN_ORG_LABELS = { fr: 'Administrateur Organisation', en: 'Organization Administrator' }

  async function imprimerCarte(p) {
    const langue = PAYS_LANGUE_DEFAULT[ctx.codePays] || 'fr'
    const L = LABELS[langue]
    const couleur = ctx.couleurPrimaire || '#1a5276'
    const couleurFonce = couleur + 'dd'
    const flag = flagEmoji(ctx.codePays)
    const initiales = ((p.prenom?.[0]||'')+(p.nom?.[0]||'')).toUpperCase()
    const photoHtml = p.urlPhotoDemandeur
      ? `<img src="${p.urlPhotoDemandeur}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" crossorigin="anonymous"/>`
      : `<span style="font-size:22px;font-weight:800;color:#fff;">${initiales}</span>`
    const dateNaiss = p.dateNaissance ? new Date(p.dateNaissance).toLocaleDateString(langue === 'en' ? 'en-GB' : 'fr-FR') : '—'
    const sexe = p.libSexe ? (SEXE_LABELS[langue][p.libSexe] || String(p.libSexe)) : '—'
    const situation = p.situationMatrimoniale ? (SITUATION_LABELS[langue][p.situationMatrimoniale] || String(p.situationMatrimoniale)) : null
    const tel = p.tel || '—'
    const libelleGroupe = ctx.codeGroupe === 'GRP_ADMIN_ORG' ? GROUPE_ADMIN_ORG_LABELS[langue] : ctx.libelleGroupe
    const fonction = ctx.libelleFonction || libelleGroupe || L.membre
    const paysNom = ctx.libPays || nomPays(ctx.codePays, langue)
    const versoBg = ctx.urlArmoiries
      ? `<img src="${ctx.urlArmoiries}" style="width:100%;height:100%;object-fit:contain;" crossorigin="anonymous"/>`
      : `<span style="font-size:120px;">${flag}</span>`

    // QR code : lien vers la fiche publique scannable de l'adhérent (infos + tableau de ses bénéficiaires)
    const qrText = `${window.location.origin}/scan.html?a=${encodeURIComponent(ctx.numAdherent || '')}`

    const qrContainer = document.createElement('div')
    qrContainer.style.cssText = 'position:absolute;left:-9999px;'
    document.body.appendChild(qrContainer)
    new QRCode(qrContainer, {
      text: qrText,
      width: 512, height: 512,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    })
    const canvas = qrContainer.querySelector('canvas')
    let qrSrc = ''
    if (canvas) {
      // Superposer le logo au centre si disponible
      if (ctx.urlLogo) {
        await new Promise(resolve => {
          const logo = new Image()
          logo.crossOrigin = 'anonymous'
          logo.onload = () => {
            const size = canvas.width
            const logoSize = Math.round(size * 0.18)   // 18% de la taille du QR
            const padding  = Math.round(logoSize * 0.15)
            const cx = Math.round((size - logoSize) / 2)
            const cy = Math.round((size - logoSize) / 2)
            const ctx2 = canvas.getContext('2d')
            // Fond blanc arrondi
            ctx2.fillStyle = '#ffffff'
            ctx2.beginPath()
            ctx2.roundRect(cx - padding, cy - padding, logoSize + padding*2, logoSize + padding*2, 8)
            ctx2.fill()
            // Logo
            ctx2.drawImage(logo, cx, cy, logoSize, logoSize)
            resolve()
          }
          logo.onerror = resolve
          logo.src = ctx.urlLogo
        })
      }
      qrSrc = canvas.toDataURL('image/png')
    }
    document.body.removeChild(qrContainer)

    const html = `<!DOCTYPE html>
<html lang="${langue}">
<head>
<meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
<title>${L.titreCarte} — ${p.prenom} ${p.nom}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f0f0; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial,sans-serif; }
  .page { display:flex; flex-direction:column; gap:32px; align-items:center; padding:40px; }
  .label { font-size:11px; font-weight:700; color:#666; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; text-align:center; }
  .carte { width:85.6mm; height:54mm; border-radius:10px; position:relative; overflow:hidden; }

  /* RECTO */
  .recto { background:${couleur}; color:#fff; display:flex; flex-direction:column; }
  .r-top { display:flex; align-items:center; gap:7px; padding:9px 11px 7px; border-bottom:1px solid rgba(255,255,255,.15); }
  .r-logo { width:26px; height:26px; border-radius:5px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; }
  .r-logo img { width:100%; height:100%; object-fit:cover; }
  .r-orgname { font-size:8px; font-weight:700; color:rgba(255,255,255,.9); flex:1; line-height:1.3; }
  .r-flag { font-size:17px; }
  .r-body { display:flex; gap:10px; padding:8px 11px; flex:1; }
  .r-photo { width:52px; height:60px; border-radius:7px; background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.3); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .r-infos { flex:1; }
  .r-name { font-size:11px; font-weight:800; color:#fff; margin-bottom:2px; }
  .r-role { font-size:7px; color:rgba(255,255,255,.55); letter-spacing:.07em; text-transform:uppercase; margin-bottom:5px; }
  .r-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; }
  .r-field label { font-size:6.5px; color:rgba(255,255,255,.45); display:block; text-transform:uppercase; letter-spacing:.06em; }
  .r-field span { font-size:8px; color:rgba(255,255,255,.92); font-weight:600; }
  .r-footer { padding:6px 11px; background:rgba(0,0,0,.2); display:flex; justify-content:space-between; align-items:center; }
  .r-num { font-size:7.5px; font-family:monospace; color:rgba(255,255,255,.75); }
  .r-badge { font-size:6.5px; font-weight:700; letter-spacing:.08em; color:rgba(255,255,255,.7); background:rgba(255,255,255,.12); padding:2px 7px; border-radius:8px; }

  /* VERSO */
  .verso { background:${couleurFonce}; display:flex; }
  .v-bg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:.08; user-select:none; overflow:hidden; }
  .v-bg img { width:100%; height:100%; object-fit:contain; }
  .v-content { position:relative; z-index:1; display:flex; width:100%; align-items:stretch; }
  .v-qr-block { width:46mm; display:flex; align-items:center; justify-content:center; padding:5px; border-right:1px solid rgba(255,255,255,.12); }
  .v-qr-block img { width:100%; height:auto; border-radius:4px; display:block; }
  .v-right { flex:1; display:flex; flex-direction:column; justify-content:center; gap:4px; padding:8px 10px; }
  .v-row label { font-size:5.5px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.07em; display:block; margin-bottom:1px; }
  .v-row span { font-size:7px; color:rgba(255,255,255,.88); font-family:monospace; word-break:break-all; }
  .v-title { font-size:6px; color:rgba(255,255,255,.35); letter-spacing:.14em; text-transform:uppercase; margin-top:6px; }

  @media print {
    body { background:white; }
    .page { padding:10mm; gap:8mm; }
    .label { display:none; }
    .carte { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="page">

  <div>
    <div class="label">${L.recto}</div>
    <div class="carte recto">
      <div class="v-bg" style="opacity:.13;">${versoBg}</div>
      <div class="r-top">
        <div class="r-logo">${ctx.urlLogo ? `<img src="${ctx.urlLogo}" crossorigin="anonymous"/>` : (ctx.nomOrganisation?.[0]||'O')}</div>
        <div class="r-orgname">${ctx.nomOrganisation||''}</div>
        <span class="r-flag">${flag}</span>
      </div>
      <div class="r-body">
        <div class="r-infos">
          <div class="r-name">${ctx.numAdherent||'—'}</div>
          <div class="r-role">${fonction}</div>
          <div class="r-grid">
            <div class="r-field"><label>${L.dateNaissance}</label><span>${dateNaiss}</span></div>
            <div class="r-field"><label>${L.sexe}</label><span>${sexe}</span></div>
            <div class="r-field"><label>${L.nom}</label><span>${(p.nom||'').toUpperCase()} ${p.prenom||''}</span></div>
            <div class="r-field"><label>${L.situation}</label><span>${situation||'—'}</span></div>
            <div class="r-field" style="grid-column:1/-1"><label>${L.telephone}</label><span>${tel}</span></div>
          </div>
        </div>
        <div class="r-photo">${photoHtml}</div>
      </div>
      <div class="r-footer">
        <div class="r-num">ID : ${ctx.orgId||''}</div>

    let loaded = 0;
    const tryPrint = () => { if (++loaded >= imgs.length) window.print(); };
    imgs.forEach(img => {
      if (img.complete) tryPrint();
      else { img.addEventListener('load', tryPrint); img.addEventListener('error', tryPrint); }
    });
  });
