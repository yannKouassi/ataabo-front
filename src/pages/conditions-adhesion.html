<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Conditions d'adhésion</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    .condition-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 14px; }
    .condition-num {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--primary-light);
      color: var(--primary-dark); font-size: 12px; font-weight: 700; display: flex; align-items: center;
      justify-content: center; margin-top: 8px;
    }
    .condition-row .form-group { flex: 1; margin-bottom: 0; }
    .condition-row textarea.form-input { resize: vertical; min-height: 60px; }

    .btn-remove {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted); font-size: 14px; line-height: 1; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .btn-remove:hover { background: #fdecea; border-color: #f5c6c0; color: #c0392b; }

    .add-condition-btn {
      width: 100%; padding: 11px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border);
      background: transparent; color: var(--primary-dark); font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; cursor: pointer;
    }
    .add-condition-btn:hover { background: var(--primary-light); border-color: var(--primary); }
    .add-condition-btn:disabled { color: var(--text-light); border-color: var(--border); cursor: not-allowed; background: transparent; }

    .max-hint { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 8px; }

    .card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .counter-badge { font-size: 11.5px; font-weight: 600; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); padding: 3px 9px; border-radius: 999px; }
    .counter-badge.max { color: var(--primary-dark); background: var(--primary-light); border-color: var(--primary-light); }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions"></div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Conditions d'adhésion</div>
      <div class="page-subtitle">Ces conditions seront affichées aux candidats avant qu'ils ne soumettent leur demande d'adhésion</div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <p class="card-title" style="margin-bottom:2px;">Vos conditions</p>
          <p class="card-sub" style="margin-bottom:0;font-size:12.5px;color:var(--text-muted);">Texte libre, 200 caractères max par condition</p>
        </div>
        <span class="counter-badge" id="admin-counter">0 / 6</span>
      </div>

      <div id="admin-rows" style="margin-top:16px;"></div>

      <button class="add-condition-btn" id="add-btn">+ Ajouter une condition</button>
      <p class="max-hint" id="max-hint" style="display:none;">Maximum de 6 conditions atteint.</p>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
        <button class="btn btn-primary" id="btn-sauvegarder">Enregistrer les conditions</button>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, logout, applyOrgColor, getPermission, hasMenu } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique, rafraichirHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()

  if (!hasMenu('/organisation/params/conditions-adhesion')) { window.location.href = '/403.html'; throw new Error() }
  const perm = getPermission('/organisation/params/conditions-adhesion')

  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const MAX_CONDITIONS = 6
  let conditions = []

  const rowsEl = document.getElementById('admin-rows')
  const addBtn = document.getElementById('add-btn')
  const maxHint = document.getElementById('max-hint')
  const counterEl = document.getElementById('admin-counter')
  const saveBtn = document.getElementById('btn-sauvegarder')

  function render() {
    rowsEl.innerHTML = conditions.map((c, i) => `
      <div class="condition-row">
        <div class="condition-num">${i + 1}</div>
        <div class="form-group">
          <label class="form-label">Condition n°${i + 1}</label>
          <textarea class="form-input" data-i="${i}" maxlength="200" placeholder="Décrire la condition..." ${!perm.peutEcrire ? 'disabled' : ''}>${c}</textarea>
        </div>
        ${perm.peutEcrire ? `<button class="btn-remove" data-remove="${i}" title="Supprimer">×</button>` : ''}
      </div>
    `).join('')

    rowsEl.querySelectorAll('textarea[data-i]').forEach(t => {
      t.addEventListener('input', () => { conditions[Number(t.dataset.i)] = t.value })
    })
    rowsEl.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!confirm('Supprimer cette condition ?')) return
        conditions.splice(Number(btn.dataset.remove), 1)
        render()
      })
    })

    const atMax = conditions.length >= MAX_CONDITIONS
    addBtn.disabled = atMax
    addBtn.style.display = (atMax || !perm.peutEcrire) ? 'none' : 'flex'
    maxHint.style.display = atMax ? 'block' : 'none'

    counterEl.textContent = `${conditions.length} / ${MAX_CONDITIONS}`
    counterEl.classList.toggle('max', atMax)
  }

  addBtn.addEventListener('click', () => {
    if (conditions.length >= MAX_CONDITIONS) return
    conditions.push('')
    render()
  })

  if (!perm.peutEcrire) {
    saveBtn.style.display = 'none'
  }

  saveBtn.addEventListener('click', async () => {
    const libelles = conditions.map(c => c.trim()).filter(c => c)
    saveBtn.disabled = true; saveBtn.textContent = 'Enregistrement...'
    try {
      await api.put(`/organisations/${encodeURIComponent(ctx.orgId)}/conditions-adhesion`, { libelles })
      toast.success('Conditions enregistrées.')
      await charger()
      rafraichirHistorique('historique-container')
    } catch (err) {
      toast.error(err.message)
    } finally {
      saveBtn.disabled = false; saveBtn.textContent = 'Enregistrer les conditions'
    }
  })

  async function charger() {
    try {
      const items = await api.get(`/organisations/${encodeURIComponent(ctx.orgId)}/conditions-adhesion`)
      conditions = (items || []).map(c => c.libelle)
      render()
    } catch (err) {
      toast.error(err.message)
    }
  }

  charger()
  buildHistorique('historique-container', 50, [
    "condition d'adhésion ajoutée",
    "condition d'adhésion supprimée",
    "conditions d'adhésion modifiées",
    "conditions d'adhésion réordonnées"
  ])
</script>
</body>
</html>
