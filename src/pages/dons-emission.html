<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Émission de dons</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Émission de dons</div>
        <div class="page-subtitle">Dons émis par votre organisation vers d'autres bénéficiaires</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" id="btn-export-csv">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exporter CSV
        </button>
        <button class="btn btn-outline btn-print" onclick="window.print()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimer
        </button>
        <button class="btn btn-primary" id="btn-nouveau-don">+ Enregistrer un don</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Bénéficiaire</th>
              <th>Montant</th>
              <th>Moyen</th>
              <th>Date</th>
              <th>Motif</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-dons">
            <tr><td colspan="7"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);" id="pagination-info"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal don -->
<div class="modal-overlay" id="modal-don" style="display:none;">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-don-title">Enregistrer un don émis</span>
      <button class="modal-close" id="modal-don-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="err-don" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>
      <div class="form-group">
        <label class="form-label">Bénéficiaire *</label>
        <input type="text" class="form-input" id="don-beneficiaire" placeholder="Nom ou organisation bénéficiaire"/>
      </div>
      <div class="form-group">
        <label class="form-label">Montant *</label>
        <input type="number" class="form-input" id="don-montant" placeholder="Montant en FCFA" min="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Moyen de paiement</label>
        <select class="form-input" id="don-moyen">
          <option value="">Choisir</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input type="date" class="form-input" id="don-date" max=""/>
      </div>
      <div class="form-group">
        <label class="form-label">Motif</label>
        <textarea class="form-input" id="don-motif" rows="2" placeholder="Motif du don"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-don-cancel">Annuler</button>
      <button class="btn btn-primary" id="btn-sauvegarder-don">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique, rafraichirHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/dons/emission')
  if (!perm.peutEcrire) document.getElementById('btn-nouveau-don').style.display = 'none'

  let page = 0, totalPages = 1
  let donsParId = {}
  let editingDonId = null
  let itemsCache = []

  async function chargerMoyens() {
    try {
      const moyens = await api.get(`/referentiel/moyens-paiement?codePays=${encodeURIComponent(ctx.codePays || '')}`)
      const sel = document.getElementById('don-moyen')
      moyens.forEach(m => {
        const opt = document.createElement('option')
        opt.value = m.id
        opt.textContent = m.libMoyPaye || m.lib
        sel.appendChild(opt)
      })
    } catch { /* optionnel */ }
  }

  async function charger() {
    const params = new URLSearchParams({ page, size: 15 })
    const tbody = document.getElementById('tbody-dons')
    tbody.innerHTML = `<tr><td colspan="7"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const data = await api.get(`/dons/emission/${ctx.orgId}?${params}`)
      const items = Array.isArray(data) ? data : (data.content || [])
      totalPages = data.totalPages || 1
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>Aucun don émis</p></div></td></tr>`
        document.getElementById('pagination-info').textContent = ''
        document.getElementById('pagination-btns').innerHTML = ''
        return
      }
      donsParId = {}
      itemsCache = items
      items.forEach(d => { donsParId[d.id] = d })
      tbody.innerHTML = items.map(d => `
        <tr>
          <td style="font-weight:600;">${d.beneficiaire||'—'}</td>
          <td style="font-weight:700; color:var(--primary);">${fmt(d.montant)}</td>
          <td style="font-size:13px;">${d.libelleMoyen||'—'}</td>
          <td style="font-size:13px;">${d.dateDon ? new Date(d.dateDon).toLocaleDateString('fr-FR') : '—'}</td>
          <td style="font-size:13px; color:var(--text-muted);">${d.motif||'—'}</td>
          <td><span class="badge badge-success">Validé</span></td>
          <td style="white-space:nowrap;">
            ${perm.peutEcrire ? `<button class="btn btn-ghost btn-sm" onclick="modifierDon('${d.id}')">Modifier</button>` : ''}
            ${perm.peutSupprimer ? `<button class="btn btn-ghost btn-sm" style="color:#b91c1c;" onclick="supprimerDon('${d.id}')">Supprimer</button>` : ''}
          </td>
        </tr>
      `).join('')
      document.getElementById('pagination-info').textContent = `Page ${page+1} / ${totalPages}`
      document.getElementById('pagination-btns').innerHTML = `
        <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
        <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  const fmt = m => m != null ? new Intl.NumberFormat('fr-FR').format(m) + ' FCFA' : '—'
  window.changerPage = n => { page = n; charger() }

  function exporterCSV() {
    const entete = ['Bénéficiaire', 'Montant', 'Moyen', 'Date', 'Motif']
    const lignes = itemsCache.map(d => [
      d.beneficiaire || '', d.montant != null ? d.montant : '', d.libelleMoyen || '',
      d.dateDon ? new Date(d.dateDon).toLocaleDateString('fr-FR') : '', d.motif || '',
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(';'))
    const csv  = '﻿' + [entete.join(';'), ...lignes].join('\n')
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' })
    const url  = URL.createObjectURL(blob)
    const a    = document.createElement('a')
    a.href = url
    a.download = `dons-emission-${new Date().toISOString().slice(0,10)}.csv`
    a.click()
    URL.revokeObjectURL(url)
  }
  document.getElementById('btn-export-csv').addEventListener('click', exporterCSV)

  document.getElementById('btn-nouveau-don').addEventListener('click', () => {
    editingDonId = null
    document.getElementById('modal-don-title').textContent = 'Enregistrer un don émis'
    document.getElementById('btn-sauvegarder-don').textContent = 'Enregistrer'
    document.getElementById('don-beneficiaire').value = ''
    document.getElementById('don-montant').value = ''
    document.getElementById('don-moyen').value = ''
    document.getElementById('don-motif').value = ''
    const aujourdhui = new Date().toISOString().slice(0,10)
    document.getElementById('don-date').max = aujourdhui
    document.getElementById('don-date').value = aujourdhui
    document.getElementById('err-don').style.display = 'none'
    document.getElementById('modal-don').style.display = 'flex'
  })
  document.getElementById('modal-don-close').addEventListener('click', () => { document.getElementById('modal-don').style.display = 'none' })
  document.getElementById('modal-don-cancel').addEventListener('click', () => { document.getElementById('modal-don').style.display = 'none' })

  window.modifierDon = function(id) {
    const d = donsParId[id]
    if (!d) return
    editingDonId = id
    document.getElementById('modal-don-title').textContent = 'Modifier le don'
    document.getElementById('btn-sauvegarder-don').textContent = 'Enregistrer les modifications'
    document.getElementById('don-beneficiaire').value = d.beneficiaire || ''
    document.getElementById('don-montant').value = d.montant || ''
    document.getElementById('don-moyen').value = ''
    document.getElementById('don-date').max = new Date().toISOString().slice(0,10)
    document.getElementById('don-date').value = d.dateDon ? d.dateDon.slice(0,10) : ''
    document.getElementById('don-motif').value = d.motif || ''
    document.getElementById('err-don').style.display = 'none'
    document.getElementById('modal-don').style.display = 'flex'
  }

  window.supprimerDon = async function(id) {
    if (!confirm('Supprimer ce don ? Cette action est irréversible.')) return
    try {
      await api.delete(`/dons/${id}`)
      toast.success('Don supprimé.')
      charger()
      rafraichirHistorique('historique-container')
    } catch(err) {
      toast.error(err.message)
    }
  }

  document.getElementById('btn-sauvegarder-don').addEventListener('click', async () => {
    const errEl = document.getElementById('err-don')
    errEl.style.display = 'none'
    const payload = {
      orgId: ctx.orgId,
      beneficiaire: document.getElementById('don-beneficiaire').value,
      montant: parseFloat(document.getElementById('don-montant').value),
      moyenPaiementId: document.getElementById('don-moyen').value,
      dateDon: document.getElementById('don-date').value,
      motif: document.getElementById('don-motif').value,
    }
    try {
      if (editingDonId) {
        await api.put(`/dons/${editingDonId}`, payload)
        toast.success('Don modifié !')
      } else {
        await api.post('/dons/emission', payload)
        toast.success('Don enregistré !')
      }
      document.getElementById('modal-don').style.display = 'none'
      charger()
      rafraichirHistorique('historique-container')
    } catch(err) {
      errEl.textContent = err.message
      errEl.style.display = 'block'
    }
  })

  chargerMoyens(); charger()
  buildHistorique('historique-container', 50, 'don émis', { orgId: ctx.orgId })
</script>
</body>
</html>
