<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Journal d'audit</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher une action..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Journal d'audit</div>
        <div class="page-subtitle">Traçabilité de toutes les actions effectuées (gpotb36)</div>
      </div>
      <button class="btn btn-outline btn-print" onclick="window.print()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>

    <!-- Filtres -->
    <div class="card" style="padding:16px; margin-bottom:20px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <input type="date" class="form-input" id="filtre-debut" style="width:auto;" placeholder="Date début"/>
        <input type="date" class="form-input" id="filtre-fin" style="width:auto;" placeholder="Date fin"/>
        <button class="btn btn-secondary" id="btn-filtrer">Filtrer</button>
        <button class="btn btn-ghost" id="btn-reset">Réinitialiser</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date / Heure</th>
              <th>Utilisateur</th>
              <th>Action effectuée</th>
              <th>Valeur précédente</th>
              <th>Nouvelle valeur</th>
              <th>Adhérent</th>
            </tr>
          </thead>
          <tbody id="tbody-audit">
            <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);" id="pagination-info"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  let allItems = [], filteredItems = [], page = 0
  const PAGE_SIZE = 25

  function formatDate(d) {
    if (!d) return '—'
    return new Date(d).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' })
  }

  async function charger() {
    const tbody = document.getElementById('tbody-audit')
    tbody.innerHTML = `<tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      allItems = await api.get(`/audit/organisation/${ctx.orgId}`)
      if (!Array.isArray(allItems)) allItems = []
      appliquerFiltres()
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  function appliquerFiltres() {
    const q = document.getElementById('search-input').value.toLowerCase()
    const debut = document.getElementById('filtre-debut').value
    const fin = document.getElementById('filtre-fin').value

    filteredItems = allItems.filter(a => {
      if (q && !((a.libelleTrait||'').toLowerCase().includes(q) ||
                 (a.nouvelleValeur||'').toLowerCase().includes(q) ||
                 (a.valeurPrecedente||'').toLowerCase().includes(q))) return false
      if (debut && a.dateAction < debut) return false
      if (fin && a.dateAction > fin + 'T23:59:59') return false
      return true
    })
    page = 0
    afficher()
  }

  function afficher() {
    const tbody = document.getElementById('tbody-audit')
    const totalPages = Math.max(1, Math.ceil(filteredItems.length / PAGE_SIZE))
    const slice = filteredItems.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE)

    if (!slice.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Aucune entrée d'audit</p></div></td></tr>`
      document.getElementById('pagination-info').textContent = ''
      document.getElementById('pagination-btns').innerHTML = ''
      return
    }

    tbody.innerHTML = slice.map(a => {
      const utilisateur = a.utilisateur
        ? `<div style="font-weight:600;font-size:13px;">${a.utilisateur.prenom||''} ${a.utilisateur.nom||''}</div>`
        : `<span style="color:var(--text-muted);">—</span>`
      const adherent = a.adherent?.numAdherent
        ? `<span style="font-family:monospace;font-size:12px;">${a.adherent.numAdherent}</span>`
        : '—'
      return `
        <tr>
          <td style="font-size:12.5px;white-space:nowrap;color:var(--text-muted);">${formatDate(a.dateAction)}</td>
          <td>${utilisateur}</td>
          <td style="font-weight:600;font-size:13px;">${a.libelleTrait||'—'}</td>
          <td style="font-size:12.5px;color:var(--text-muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;">${a.valeurPrecedente||'—'}</td>
          <td style="font-size:12.5px;max-width:180px;overflow:hidden;text-overflow:ellipsis;">${a.nouvelleValeur||'—'}</td>
          <td>${adherent}</td>
        </tr>`
    }).join('')

    document.getElementById('pagination-info').textContent = `Page ${page+1} / ${totalPages} · ${filteredItems.length} entrée(s)`
    document.getElementById('pagination-btns').innerHTML = `
      <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
      <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
  }

  window.changerPage = n => { page = n; afficher() }

  document.getElementById('btn-filtrer').addEventListener('click', appliquerFiltres)
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('filtre-debut').value = ''
    document.getElementById('filtre-fin').value = ''
    document.getElementById('search-input').value = ''
    appliquerFiltres()
  })

  let t; document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(appliquerFiltres, 350)
  })

  charger()
</script>
</body>
</html>
