<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Dashboard système</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Dashboard système</div>
      <div class="page-subtitle">Vue globale de la plateforme Ataabo</div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:24px;" id="stats-grid">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>

    <!-- Graphiques -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
      <div class="card" style="padding:20px;">
        <div style="font-size:13px; font-weight:700; margin-bottom:16px; color:var(--text);">Organisations par type</div>
        <canvas id="chart-types" height="160"></canvas>
      </div>
      <div class="card" style="padding:20px;">
        <div style="font-size:13px; font-weight:700; margin-bottom:16px; color:var(--text);">Top 5 organisations (adhérents)</div>
        <canvas id="chart-top" height="160"></canvas>
      </div>
    </div>

    <div class="card">
      <div style="padding:16px; border-bottom:1px solid var(--border); font-weight:700; font-size:14px;">Organisations actives</div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Organisation</th><th>Type</th><th>Pays</th><th>Adhérents</th></tr></thead>
          <tbody id="tbody-orgs">
            <tr><td colspan="4"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()

  // Seul l'admin plateforme peut voir cette page
  if (ctx.orgId !== 'PLATEFORME') {
    window.location.replace('/dashboard.html')
    throw new Error()
  }

  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  function statCard(label, value, color) {
    return `<div class="card" style="padding:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;">${label}</div>
      <div style="font-size:28px;font-weight:800;color:${color||'var(--text)'};">${value}</div>
    </div>`
  }

  let chartTypes, chartTop

  function dessinerGraphiques(stats) {
    const primary = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#6366f1'
    const PALETTE = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4']

    // Graphique 1 — répartition par type d'organisation
    const repartition = stats.repartitionTypes || {}
    const typesLabels = Object.keys(repartition)
    const typesData = Object.values(repartition)
    if (chartTypes) chartTypes.destroy()
    chartTypes = new Chart(document.getElementById('chart-types'), {
      type: 'doughnut',
      data: {
        labels: typesLabels,
        datasets: [{ data: typesData, backgroundColor: PALETTE.slice(0, typesLabels.length), borderWidth: 0 }]
      },
      options: { plugins: { legend: { position: 'right' } }, cutout: '60%' }
    })

    // Graphique 2 — top 5 organisations par adhérents
    const top = stats.topOrganisations || []
    const topLabels = top.map(o => o.nom)
    const topData = top.map(o => o.membres)
    if (chartTop) chartTop.destroy()
    chartTop = new Chart(document.getElementById('chart-top'), {
      type: 'bar',
      data: {
        labels: topLabels,
        datasets: [{
          label: 'Adhérents',
          data: topData,
          backgroundColor: primary + 'bb',
          borderRadius: 4
        }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    })
  }

  async function charger() {
    try {
      const stats = await api.get('/admin/stats-plateforme')
      document.getElementById('stats-grid').innerHTML = [
        statCard('Organisations actives', stats.totalOrganisations ?? '—', 'var(--primary)'),
        statCard('Adhérents total', stats.totalAdherents ?? '—', 'var(--primary)'),
        statCard('Utilisateurs sans org', stats.utilisateursSansOrganisation ?? '—', '#d97706'),
        statCard('Pays couverts', stats.totalPays ?? '—'),
      ].join('')
      dessinerGraphiques(stats)
    } catch {
      document.getElementById('stats-grid').innerHTML = '<p style="color:var(--text-muted);font-size:13px;">Statistiques non disponibles</p>'
    }

    try {
      const orgs = await api.get('/organisations/actives')
      const tbody = document.getElementById('tbody-orgs')
      if (!orgs || !orgs.length) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:20px;">Aucune organisation active</td></tr>`
        return
      }
      tbody.innerHTML = orgs.map(o => `
        <tr>
          <td style="font-weight:600;">${o.libAssociation || o.nomOrganisation || '—'}</td>
          <td><span class="badge badge-secondary">${o.typeOrganisation?.libelle || o.typeOrganisation || '—'}</span></td>
          <td style="font-size:13px;">${o.pays?.libPays || o.codePays || '—'}</td>
          <td style="font-size:13px;">${o.nombreAdherents ?? '—'}</td>
        </tr>
      `).join('')
    } catch(err) {
      document.getElementById('tbody-orgs').innerHTML = `<tr><td colspan="4" style="color:#b91c1c;padding:20px;">Erreur : ${err.message}</td></tr>`
    }
  }

  charger()
</script>
</body>
</html>
