<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Utilisateurs</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher un utilisateur..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Utilisateurs</div>
        <div class="page-subtitle">Liste des comptes utilisateurs de l'organisation</div>
      </div>
      <button class="btn btn-outline btn-print" onclick="window.print()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>

    <!-- Filtres -->
    <div class="card" style="margin-bottom:20px; padding:16px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <select class="form-input" id="filtre-statut" style="width:auto; min-width:160px;">
          <option value="">Tous les statuts</option>
          <option value="ACTIF">Actif</option>
          <option value="INACTIF">Inactif</option>
          <option value="BANNI">Banni</option>
        </select>
        <button class="btn btn-secondary" id="btn-filtrer">Filtrer</button>
        <button class="btn btn-ghost" id="btn-reset">Réinitialiser</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Utilisateur</th>
              <th>N° Adhérent</th>
              <th>Groupe / Rôle</th>
              <th>Statut</th>
              <th>Depuis</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-utilisateurs">
            <tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);" id="pagination-info"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const navUrl = sessionStorage.getItem('lastNavUrl') || '/utilisateurs/liste'
  const perm = getPermission(navUrl)

  let page = 0, totalPages = 1
  let tousLesUtilisateurs = []

  async function charger() {
    const tbody = document.getElementById('tbody-utilisateurs')
    tbody.innerHTML = `<tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const data = await api.get(`/utilisateurs/organisation/${ctx.orgId}`)
      tousLesUtilisateurs = Array.isArray(data) ? data : (data.content || [])
      afficherFiltres()
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  function afficherFiltres() {
    const statut    = document.getElementById('filtre-statut').value
    const recherche = document.getElementById('search-input').value.toLowerCase().trim()

    let items = tousLesUtilisateurs
    if (statut)    items = items.filter(u => u.statut === statut)
    if (recherche) items = items.filter(u =>
      (u.prenomPersonne + ' ' + u.nomPersonne).toLowerCase().includes(recherche) ||
      (u.emailPersonne || '').toLowerCase().includes(recherche) ||
      (u.numAdherent || '').toLowerCase().includes(recherche)
    )

    const pageSize = 20
    totalPages = Math.max(1, Math.ceil(items.length / pageSize))
    if (page >= totalPages) page = 0
    const pageItems = items.slice(page * pageSize, (page + 1) * pageSize)

    const tbody = document.getElementById('tbody-utilisateurs')

    if (!pageItems.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Aucun utilisateur</p></div></td></tr>`
      document.getElementById('pagination-info').textContent = ''
      document.getElementById('pagination-btns').innerHTML = ''
      return
    }

    tbody.innerHTML = pageItems.map(u => `
        <tr id="row-${u.idUtilisateur}">
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div style="width:34px;height:34px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">
                ${((u.prenomPersonne?.[0]||'')+(u.nomPersonne?.[0]||'')).toUpperCase() || '?'}
              </div>
              <div>
                <div style="font-weight:600;font-size:13.5px;">${u.prenomPersonne||''} ${u.nomPersonne||''}</div>
                <div style="font-size:12px;color:var(--text-muted);">${u.emailPersonne||''}</div>
              </div>
            </div>
          </td>
          <td style="font-family:monospace;font-size:12px;">${u.numAdherent||'—'}</td>
          <td><span class="badge badge-secondary">${u.libelleGroupe||'—'}</span></td>
          <td>${badgeStatut(u.statut, u.idUtilisateur)}</td>
          <td style="font-size:12.5px;color:var(--text-muted);">${u.dateCreation ? new Date(u.dateCreation).toLocaleDateString('fr-FR') : '—'}</td>
          <td style="display:flex;gap:6px;align-items:center;">
            ${perm.peutEcrire && u.statut !== 'BANNI' ? `<button class="btn btn-ghost btn-sm" id="btn-toggle-${u.idUtilisateur}" onclick="toggleActif('${u.idUtilisateur}', '${u.prenomPersonne||''} ${u.nomPersonne||''}'.trim(), ${u.actif})">${u.actif ? 'Désactiver' : 'Activer'}</button>` : ''}
            ${perm.peutSupprimer && u.statut !== 'BANNI' ? `<button class="btn btn-ghost btn-sm" style="color:#b91c1c;" onclick="supprimerAcces('${u.idUtilisateur}', '${u.prenomPersonne||''} ${u.nomPersonne||''}'.trim())">Bannir</button>` : ''}
          </td>
        </tr>
      `).join('')

    document.getElementById('pagination-info').textContent = `Page ${page+1} / ${totalPages}`
    document.getElementById('pagination-btns').innerHTML = `
      <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
      <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
  }

  function badgeStatut(statut, id) {
    const map   = { ACTIF: 'badge-success', INACTIF: 'badge-secondary', BANNI: 'badge-danger' }
    const label = { ACTIF: 'Actif', INACTIF: 'Inactif', BANNI: 'Banni' }
    return `<span class="badge ${map[statut] || 'badge-secondary'}" id="badge-${id||''}">${label[statut] || statut || '—'}</span>`
  }

  window.toggleActif = async (id, nom, actuelActif) => {
    const action = actuelActif ? 'désactiver' : 'activer'
    if (!confirm(`Voulez-vous ${action} le compte de ${nom || 'cet utilisateur'} ?`)) return
    const btn = document.getElementById(`btn-toggle-${id}`)
    if (btn) { btn.disabled = true; btn.textContent = '...' }
    try {
      const res = await api.put(`/utilisateurs/${id}/toggle-actif`, {})
      const badge = document.getElementById(`badge-${id}`)
      if (badge) {
        const map   = { ACTIF: 'badge-success', INACTIF: 'badge-secondary', BANNI: 'badge-danger' }
        const label = { ACTIF: 'Actif', INACTIF: 'Inactif', BANNI: 'Banni' }
        badge.className = `badge ${map[res.statut] || 'badge-secondary'}`
        badge.textContent = label[res.statut] || res.statut
      }
      if (btn) { btn.disabled = false; btn.textContent = res.actif ? 'Désactiver' : 'Activer' }
      toast.success(res.actif ? 'Compte activé.' : 'Compte désactivé.')
    } catch(err) {
      if (btn) { btn.disabled = false; btn.textContent = actuelActif ? 'Désactiver' : 'Activer' }
      toast.error(err.message)
    }
  }

  window.supprimerAcces = async (id, nom) => {
    if (!confirm(`Supprimer l'accès de ${nom || 'cet utilisateur'} ?\n\nIl restera adhérent mais n'aura plus accès à la plateforme.`)) return
    try {
      await api.delete(`/utilisateurs/${id}/acces`)
      toast.success('Accès supprimé.')
      charger()
    } catch(err) {
      toast.error(err.message)
    }
  }

  window.changerPage = n => { page = n; afficherFiltres() }

  document.getElementById('btn-filtrer').addEventListener('click', () => { page = 0; afficherFiltres() })
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('filtre-statut').value = ''
    document.getElementById('search-input').value = ''
    page = 0; afficherFiltres()
  })

  let t; document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(() => { page = 0; afficherFiltres() }, 400)
  })

  charger()
  buildHistorique('historique-container', 50, 'utilisateur', { orgId: ctx.orgId })
</script>
</body>
</html>
