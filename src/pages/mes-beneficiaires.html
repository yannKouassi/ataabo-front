<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Mes bénéficiaires</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <script src="/qrcode.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <div>
        <div class="page-title">Mes bénéficiaires</div>
        <div class="page-subtitle">Personnes que vous avez désignées comme bénéficiaires</div>
      </div>
      <button class="btn btn-primary" id="btn-ajouter-benef">+ Ajouter</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nom & prénom</th>
              <th>Matricule</th>
              <th>Sexe</th>
              <th>Date de naissance</th>
              <th>Téléphone</th>
              <th>Email</th>
              <th>Depuis</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-beneficiaires">
            <tr><td colspan="8"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:20px;padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- MODAL AJOUTER BÉNÉFICIAIRE -->
<div id="modal-benef" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:480px;padding:28px;position:relative;">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;">Ajouter un bénéficiaire</div>
    <div id="err-modal-benef" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>

    <div class="form-group">
      <label class="form-label">Membre de l'organisation *</label>
      <select class="form-input" id="benef-adherent">
        <option value="">Chargement...</option>
      </select>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" id="btn-annuler-benef">Annuler</button>
      <button class="btn btn-primary" id="btn-confirmer-benef">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { buildHistorique, rafraichirHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/moi/beneficiaires')
  if (!perm.peutEcrire) document.getElementById('btn-ajouter-benef').style.display = 'none'

  const tbody = document.getElementById('tbody-beneficiaires')
  const modal = document.getElementById('modal-benef')
  const errModal = document.getElementById('err-modal-benef')

  async function charger() {
    try {
      const items = await api.get('/beneficiaires/moi')
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p>Aucun bénéficiaire enregistré</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(b => {
        const sexe = b.beneficiaire?.sexe?.libSexe === 'MASCULIN' ? 'M' : b.beneficiaire?.sexe?.libSexe === 'FEMININ' ? 'F' : '—'
        const ddn  = b.beneficiaire?.dateNaisPersonne ? new Date(b.beneficiaire.dateNaisPersonne).toLocaleDateString('fr-FR') : '—'
        const mat  = b.matricule || '—'
        return `<tr>
          <td style="font-weight:600;">${b.beneficiaire?.prenPersonne||''} ${b.beneficiaire?.nomPersonne||''}</td>
          <td><span style="font-family:monospace;font-size:12px;background:#eff6ff;color:#1e40af;padding:2px 8px;border-radius:4px;">${mat}</span></td>
          <td style="font-size:13px;">${sexe}</td>
          <td style="font-size:13px;">${ddn}</td>
          <td style="font-size:13px;">${b.beneficiaire?.telPersonne || '—'}</td>
          <td style="font-size:13px;">${b.beneficiaire?.emailPersonne || '—'}</td>
          <td style="font-size:13px;">${b.dateLien ? new Date(b.dateLien).toLocaleDateString('fr-FR') : '—'}</td>
          <td style="text-align:right;white-space:nowrap;display:flex;gap:6px;justify-content:flex-end;">
            ${b.matricule ? `<button class="btn btn-sm" style="color:#1565c0;background:none;border:1px solid #93c5fd;border-radius:6px;cursor:pointer;font-size:13px;"
              data-mat="${b.matricule}"
              data-prenom="${b.beneficiaire?.prenPersonne||''}"
              data-nom="${b.beneficiaire?.nomPersonne||''}"
              data-photo="${b.beneficiaire?.urlPhoto||''}"
              data-since-raw="${b.dateLien || ''}"
              data-ddn-raw="${b.beneficiaire?.dateNaisPersonne || ''}"
              data-sexe="${b.beneficiaire?.sexe?.libSexe||''}"
              data-tel="${b.beneficiaire?.telPersonne||''}"
              onclick="imprimerCarte(this)">
              <span style="display:inline-flex;align-items:center;gap:5px;">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="6" y1="15" x2="10" y2="15"/><circle cx="9" cy="10" r="1.5"/><line x1="14" y1="9" x2="18" y2="9"/><line x1="14" y1="12" x2="18" y2="12"/></svg>
                Carte
              </span>
            </button>` : ''}
            <button class="btn btn-sm" style="color:#b91c1c;background:none;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;font-size:13px;" data-id="${b.id}">Supprimer</button>
          </td>
        </tr>`
      }).join('')

      if (!perm.peutSupprimer) {
        tbody.querySelectorAll('[data-id]').forEach(btn => btn.style.display = 'none')
      } else {
        tbody.querySelectorAll('[data-id]').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Supprimer ce bénéficiaire ?')) return
            try {
              await api.delete(`/beneficiaires/${btn.dataset.id}`)
              charger()
              rafraichirHistorique('historique-container')
            } catch(e) { alert(e.message) }
          })
        })
      }
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  document.getElementById('btn-ajouter-benef').addEventListener('click', async () => {
    errModal.style.display = 'none'
    modal.style.display = 'flex'

    // Charger les filiations de l'adhérent connecté
    const filiations = await api.get(`/filiations/adherent/${ctx.numAdherent}`).catch(() => [])
    document.getElementById('benef-adherent').innerHTML =
      `<option value="">Choisir parmi vos filiations</option>` +
      filiations.map(f => {
        const nom = `${f.afiliation?.prenPersonne||''} ${f.afiliation?.nomPersonne||''}`.trim()
        const type = f.filiation?.libelleFiliation || ''
        return `<option value="${f.afiliation?.idPersonne}">${nom} — ${type}</option>`
      }).join('')
  })

  document.getElementById('btn-annuler-benef').addEventListener('click', () => { modal.style.display = 'none' })

  document.getElementById('btn-confirmer-benef').addEventListener('click', async () => {
    errModal.style.display = 'none'
    const idPersonneBeneficiaire = document.getElementById('benef-adherent').value
    if (!idPersonneBeneficiaire) {
      errModal.textContent = 'Veuillez sélectionner un membre.'
      errModal.style.display = 'block'
      return
    }
    if (!ctx.idPersonne) {
      errModal.textContent = 'Votre identifiant personnel est introuvable. Reconnectez-vous.'
      errModal.style.display = 'block'
      return
    }
    try {
      await api.post('/beneficiaires', { idPersonneBeneficiaire })
      modal.style.display = 'none'
      charger()
      rafraichirHistorique('historique-container')
    } catch(e) {
      errModal.textContent = e.message
      errModal.style.display = 'block'
    }
  })

  function flagEmoji(code3) {
    const map = { CIV:'CI', BEN:'BJ', SEN:'SN', CMR:'CM', MLI:'ML', BFA:'BF', GHA:'GH', FRA:'FR', GIN:'GN', TGO:'TG', NER:'NE', TCH:'TD', COD:'CD', MDG:'MG', USA:'US', GBR:'GB', NGA:'NG' }
    const c2 = map[(code3||'').toUpperCase()] || (code3||'').slice(0,2).toUpperCase()
    if (c2.length !== 2) return ''
    return String.fromCodePoint(...[...c2].map(c => 127397 + c.charCodeAt(0)))
  }

  // Langue de la carte imprimée : dérivée du pays de l'organisation (même convention que mon-profil.html)
  const PAYS_LANGUE_DEFAULT = { CIV: 'fr', BEN: 'fr', MLI: 'fr', NGA: 'en', MDG: 'fr' }
  const LABELS = {
    fr: {
      recto: 'Recto', verso: 'Verso', dateNaissance: 'Date de naissance', sexe: 'Sexe', nom: 'Nom',
      telephone: 'Téléphone', designeLe: 'Désigné le', beneficiaire: 'Bénéficiaire',
      numBeneficiaire: 'N° bénéficiaire', numAdherent: 'N° adhérent', organisation: 'Organisation',
      pays: 'Pays', titreCarte: 'Carte bénéficiaire', localeDate: 'fr-FR'
    },
    en: {
      recto: 'Front', verso: 'Back', dateNaissance: 'Date of birth', sexe: 'Gender', nom: 'Name',
      telephone: 'Phone', designeLe: 'Designated on', beneficiaire: 'Beneficiary',
      numBeneficiaire: 'Beneficiary No.', numAdherent: 'Member No.', organisation: 'Organisation',
      pays: 'Country', titreCarte: 'Beneficiary card', localeDate: 'en-GB'
    }
  }

  window.imprimerCarte = async function(btn) {
    const matricule = btn.dataset.mat
    const prenom    = btn.dataset.prenom
    const nom       = btn.dataset.nom
    const photo     = btn.dataset.photo
    const sexe      = btn.dataset.sexe === 'MASCULIN' ? 'M' : btn.dataset.sexe === 'FEMININ' ? 'F' : btn.dataset.sexe || '—'
    const tel       = btn.dataset.tel

    const langue = PAYS_LANGUE_DEFAULT[ctx.codePays] || 'fr'
    const L = LABELS[langue]
    const since = btn.dataset.sinceRaw ? new Date(btn.dataset.sinceRaw).toLocaleDateString(L.localeDate) : ''
    const ddn   = btn.dataset.ddnRaw ? new Date(btn.dataset.ddnRaw).toLocaleDateString(L.localeDate) : ''

    const couleur     = ctx.couleurPrimaire || '#1a5276'
    const couleurFonce = couleur + 'dd'
    const flag        = flagEmoji(ctx.codePays)
    const initiales   = ((prenom?.[0]||'')+(nom?.[0]||'')).toUpperCase()
    const paysNom     = ctx.libPays || ctx.codePays || ''

    const photoHtml = photo
      ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;" crossorigin="anonymous"/>`
      : `<span style="font-size:18px;font-weight:800;color:#fff;">${initiales||'👤'}</span>`

    const versoBg = ctx.urlArmoiries
      ? `<img src="${ctx.urlArmoiries}" style="width:100%;height:100%;object-fit:contain;" crossorigin="anonymous"/>`
      : `<span style="font-size:120px;">${flag}</span>`

    const logoHtml = ctx.urlLogo
      ? `<img src="${ctx.urlLogo}" style="width:100%;height:100%;object-fit:cover;" crossorigin="anonymous"/>`
      : (ctx.nomOrganisation?.[0] || 'O')

    // QR code 512×512 : lien vers la fiche publique scannable de ce bénéficiaire
    const qrText = `${window.location.origin}/scan.html?b=${encodeURIComponent(matricule || '')}`

    const qrDiv = document.createElement('div')
    qrDiv.style.cssText = 'position:absolute;left:-9999px;'
    document.body.appendChild(qrDiv)
    new QRCode(qrDiv, {
      text: qrText,
      width: 512, height: 512,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.L
    })
    const canvas = qrDiv.querySelector('canvas')
    let qrSrc = ''
    if (canvas) {
      if (ctx.urlLogo) {
        await new Promise(resolve => {
          const logo = new Image()
          logo.crossOrigin = 'anonymous'
          logo.onload = () => {
            const size = canvas.width
            const logoSize = Math.round(size * 0.18)
            const padding  = Math.round(logoSize * 0.15)
            const cx = Math.round((size - logoSize) / 2)
            const cy = Math.round((size - logoSize) / 2)
            const ctx2 = canvas.getContext('2d')
            ctx2.fillStyle = '#ffffff'
            ctx2.beginPath()
            ctx2.roundRect(cx - padding, cy - padding, logoSize + padding*2, logoSize + padding*2, 8)
            ctx2.fill()
            ctx2.drawImage(logo, cx, cy, logoSize, logoSize)
            resolve()
          }
          logo.onerror = resolve
          logo.src = ctx.urlLogo
        })
      }
      qrSrc = canvas.toDataURL('image/png')
    }
    document.body.removeChild(qrDiv)

    const html = `<!DOCTYPE html>
<html lang="${langue}"><head><meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
<title>${L.titreCarte} — ${prenom} ${nom}</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f0f0; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial,sans-serif; }
  .page { display:flex; flex-direction:column; gap:32px; align-items:center; padding:40px; }
  .label { font-size:11px; font-weight:700; color:#666; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; text-align:center; }
  .carte { width:85.6mm; height:54mm; border-radius:10px; position:relative; overflow:hidden; }

  /* RECTO */
  .recto { background:${couleur}; color:#fff; display:flex; flex-direction:column; }
  .r-top { display:flex; align-items:center; gap:7px; padding:9px 11px 7px; border-bottom:1px solid rgba(255,255,255,.15); }
  .r-logo { width:26px; height:26px; border-radius:5px; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden; }
  .r-orgname { font-size:8px; font-weight:700; color:rgba(255,255,255,.9); flex:1; line-height:1.3; }
  .r-flag { font-size:17px; }
  .r-body { display:flex; gap:10px; padding:8px 11px; flex:1; overflow:hidden; min-height:0; }
  .r-photo { width:52px; height:60px; border-radius:7px; background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.3); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .r-infos { flex:1; }
  .r-name { font-size:11px; font-weight:800; color:#fff; margin-bottom:2px; }
  .r-role { font-size:7px; color:rgba(255,255,255,.55); letter-spacing:.07em; text-transform:uppercase; margin-bottom:5px; }
  .r-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; }
  .r-field label { font-size:6.5px; color:rgba(255,255,255,.45); display:block; text-transform:uppercase; letter-spacing:.06em; }
  .r-field span { font-size:8px; color:rgba(255,255,255,.92); font-weight:600; }
  .r-footer { padding:6px 11px; background:rgba(0,0,0,.2); display:flex; justify-content:space-between; align-items:center; }
  .r-num { font-size:7.5px; font-family:monospace; color:rgba(255,255,255,.75); }
  .r-badge { font-size:6.5px; font-weight:700; letter-spacing:.08em; color:rgba(255,255,255,.7); background:rgba(255,255,255,.12); padding:2px 7px; border-radius:8px; }

  /* VERSO */
  .verso { background:${couleurFonce}; display:flex; }
  .v-bg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:120px; opacity:.13; user-select:none; }
  .v-content { position:relative; z-index:1; display:flex; width:100%; align-items:stretch; }
  .v-qr-block { width:46mm; display:flex; align-items:center; justify-content:center; padding:5px; border-right:1px solid rgba(255,255,255,.12); }
  .v-qr-block img { width:100%; height:auto; border-radius:4px; display:block; }
  .v-div { width:36px; height:1px; background:rgba(255,255,255,.2); }
  .v-title { font-size:7px; color:rgba(255,255,255,.45); letter-spacing:.14em; text-transform:uppercase; }
  .v-right { width:112px; display:flex; flex-direction:column; justify-content:space-between; gap:0; padding:8px 10px; }
  .v-row label { font-size:5.5px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.07em; display:block; margin-bottom:1px; }
  .v-row span { font-size:7.5px; color:rgba(255,255,255,.88); font-family:monospace; }
  .v-qr { display:flex; justify-content:center; margin-top:4px; }
  .v-qr img { border-radius:5px; width:72px!important; height:72px!important; }

  @media print {
    body { background:white; }
    .page { padding:10mm; gap:8mm; }
    .label { display:none; }
    .carte { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head><body>
<div class="page">

  <div>
    <div class="label">${L.recto}</div>
    <div class="carte recto">
      <div class="v-bg" style="opacity:.13;">${versoBg}</div>
      <div class="r-top">
        <div class="r-logo">${logoHtml}</div>
        <div class="r-orgname">${ctx.nomOrganisation||''}</div>
        <span class="r-flag">${flag}</span>
      </div>
      <div class="r-body">
        <div class="r-infos">
          <div class="r-name">${matricule}</div>
          <div class="r-role">${L.beneficiaire}</div>
          <div class="r-grid">
            <div class="r-field"><label>${L.dateNaissance}</label><span>${ddn||'—'}</span></div>
            <div class="r-field"><label>${L.sexe}</label><span>${sexe}</span></div>
            <div class="r-field"><label>${L.nom}</label><span>${nom.toUpperCase()} ${prenom}</span></div>
            ${tel ? `<div class="r-field"><label>${L.telephone}</label><span>${tel}</span></div>` : '<div class="r-field"></div>'}
            ${since ? `<div class="r-field" style="grid-column:1/-1"><label>${L.designeLe}</label><span>${since}</span></div>` : ''}
          </div>
        </div>
        <div class="r-photo">${photoHtml}</div>
      </div>
      <div class="r-footer">
        <div class="r-num">ID : ${ctx.orgId||''}</div>
        <div class="r-badge">${ctx.nomPlateforme||'UnioNova'}</div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">${L.verso}</div>
    <div class="carte verso">
      <div class="v-bg">${versoBg}</div>
      <div class="v-content">
        <div class="v-qr-block">
          ${qrSrc ? `<img src="${qrSrc}" crossorigin="anonymous"/>` : ''}
        </div>
        <div class="v-right">
          <div class="v-row"><label>${L.numBeneficiaire}</label><span>${matricule}</span></div>
          <div class="v-row"><label>${L.numAdherent}</label><span>${ctx.numAdherent||'—'}</span></div>
          <div class="v-row"><label>${L.organisation}</label><span>${(ctx.nomOrganisation||'').substring(0,30)}</span></div>
          <div class="v-row"><label>${L.pays}</label><span>${paysNom}</span></div>
          ${since ? `<div class="v-row"><label>${L.designeLe}</label><span>${since}</span></div>` : ''}
          <div style="font-size:6px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;">${ctx.nomPlateforme||'UnioNova'}</div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>window.onload = () => window.print()<\/script>
</body></html>`

    const win = window.open('', '_blank', 'width=700,height=600')
    win.document.write(html)
    win.document.close()
  }

  charger()
  buildHistorique('historique-container', 50, ['ajout bénéficiaire', 'suppression bénéficiaire'])
</script>
</body>
</html>
