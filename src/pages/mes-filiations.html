<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Mes filiations</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <div>
        <div class="page-title">Mes filiations</div>
        <div class="page-subtitle">Vos liens de parenté déclarés</div>
      </div>
      <button class="btn btn-primary" id="btn-ajouter-filiation">+ Ajouter</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Type de lien</th>
              <th>Nom & prénom</th>
              <th>Sexe</th>
              <th>Date de naissance</th>
              <th>Téléphone</th>
              <th>Email</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-filiations">
            <tr><td colspan="7"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:20px;padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- MODAL AJOUTER / MODIFIER FILIATION -->
<div id="modal-filiation" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:480px;padding:28px;position:relative;">
    <div id="modal-fil-titre" style="font-size:16px;font-weight:700;margin-bottom:20px;">Ajouter une filiation</div>
    <div id="err-modal-fil" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>

    <!-- Champs création personne (mode Ajouter uniquement) -->
    <div id="row-personne">
      <!-- Photo -->
      <div class="form-group" style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
        <div id="fil-photo-preview" style="width:64px;height:64px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px dashed #cbd5e1;flex-shrink:0;overflow:hidden;">👤</div>
        <div>
          <label class="form-label" style="margin-bottom:4px;">Photo (optionnelle)</label>
          <input type="file" id="fil-photo" accept="image/*" style="font-size:13px;"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input class="form-input" id="fil-nom" type="text" placeholder="Nom"/>
        </div>
        <div class="form-group">
          <label class="form-label">Prénom *</label>
          <input class="form-input" id="fil-prenom" type="text" placeholder="Prénom"/>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Date de naissance</label>
          <input class="form-input" id="fil-ddn" type="date"/>
        </div>
        <div class="form-group">
          <label class="form-label">Sexe</label>
          <select class="form-input" id="fil-sexe">
            <option value="">—</option>
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
            <option value="N">Neutre</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <div style="display:flex;gap:6px;">
            <span id="fil-indicatif" style="display:flex;align-items:center;padding:0 10px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;color:#475569;white-space:nowrap;flex-shrink:0;"></span>
            <input class="form-input" id="fil-tel" type="tel" placeholder="07 00 00 00 00" style="flex:1;"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="fil-email" type="email" placeholder="(optionnel)"/>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Type de lien *</label>
      <select class="form-input" id="fil-type"></select>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px;justify-content:flex-end;">
      <button class="btn btn-secondary" id="btn-annuler-fil">Annuler</button>
      <button class="btn btn-primary" id="btn-confirmer-fil">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { buildHistorique, rafraichirHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/moi/filiations')
  if (!perm.peutEcrire) document.getElementById('btn-ajouter-filiation').style.display = 'none'

  const tbody = document.getElementById('tbody-filiations')
  const modal = document.getElementById('modal-filiation')
  const errModal = document.getElementById('err-modal-fil')
  let _modeEdit = false
  let _idEnCours = null
  let _typesCache = []
  const INDICATIFS = { CIV: '+225', BEN: '+229', MLI: '+223', NGA: '+234', MDG: '+261' }
  const _indicatif = ctx.codePays ? (INDICATIFS[ctx.codePays] || '+225') : (INDICATIFS[localStorage.getItem('pays')] || '+225')

  async function charger() {
    try {
      const items = await api.get(`/filiations/adherent/${ctx.numAdherent || ''}`)
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>Aucune filiation enregistrée</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(f => {
        const prenom = f.afiliation?.prenPersonne || ''
        const nom    = f.afiliation?.nomPersonne || ''
        const ddn    = f.afiliation?.dateNaisPersonne
          ? new Date(f.afiliation.dateNaisPersonne).toLocaleDateString('fr-FR') : '—'
        const type   = f.filiation?.libelleFiliation || '—'
        const sexe   = f.afiliation?.sexe?.libSexe === 'MASCULIN' ? 'M' : f.afiliation?.sexe?.libSexe === 'FEMININ' ? 'F' : '—'
        const tel    = f.afiliation?.telPersonne || '—'
        const email  = f.afiliation?.emailPersonne || '—'
        return `<tr>
          <td><span class="badge badge-info">${type}</span></td>
          <td style="font-weight:600;">${prenom} ${nom}</td>
          <td style="font-size:13px;">${sexe}</td>
          <td style="font-size:13px;">${ddn}</td>
          <td style="font-size:13px;">${tel}</td>
          <td style="font-size:13px;">${email}</td>
          <td style="text-align:right;white-space:nowrap;">
            ${perm.peutEcrire ? `<button class="btn btn-sm btn-secondary btn-modifier" data-id="${f.id}" data-type="${f.filiation?.idFiliation||''}" style="margin-right:6px;">Modifier</button>` : ''}
            ${perm.peutSupprimer ? `<button class="btn btn-sm" style="color:#b91c1c;background:none;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;font-size:13px;" data-del="${f.id}">Supprimer</button>` : ''}
          </td>
        </tr>`
      }).join('')

      // Modifier
      tbody.querySelectorAll('.btn-modifier').forEach(btn => {
        btn.addEventListener('click', () => ouvrirModal(true, btn.dataset.id, btn.dataset.type))
      })
      // Supprimer
      tbody.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Supprimer cette filiation ?')) return
          try { await api.delete(`/filiations/${btn.dataset.del}`); charger(); rafraichirHistorique('historique-container') }
          catch(e) { alert(e.message) }
        })
      })
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  async function chargerReferentiels() {
    if (!_typesCache.length)
      _typesCache = await api.get('/filiations/types').catch(() => [])
  }

  async function ouvrirModal(edit = false, id = null, idTypeActuel = '') {
    _modeEdit = edit
    _idEnCours = id
    errModal.style.display = 'none'
    document.getElementById('modal-fil-titre').textContent = edit ? 'Modifier le type de lien' : 'Ajouter une filiation'
    document.getElementById('row-personne').style.display = edit ? 'none' : ''

    // Réinitialiser les champs en mode ajout
    if (!edit) {
      ;['fil-nom','fil-prenom','fil-tel','fil-email'].forEach(id => document.getElementById(id).value = '')
      const ddn = document.getElementById('fil-ddn')
      ddn.value = ''
      ddn.max = new Date().toISOString().split('T')[0]
      document.getElementById('fil-sexe').value = ''
      document.getElementById('fil-photo').value = ''
      document.getElementById('fil-photo-preview').innerHTML = '👤'
      document.getElementById('fil-photo-preview').style.background = '#e2e8f0'
      document.getElementById('fil-indicatif').textContent = _indicatif
    }

    await chargerReferentiels()

    document.getElementById('fil-type').innerHTML =
      `<option value="">Choisir le lien</option>` +
      _typesCache.map(t => `<option value="${t.idFiliation}" ${t.idFiliation === idTypeActuel ? 'selected' : ''}>${t.libelleFiliation}</option>`).join('')

    modal.style.display = 'flex'
  }

  // Prévisualisation photo
  document.getElementById('fil-photo').addEventListener('change', function() {
    const file = this.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = e => {
      const preview = document.getElementById('fil-photo-preview')
      preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`
      preview.style.background = 'none'
    }
    reader.readAsDataURL(file)
  })

  document.getElementById('btn-ajouter-filiation').addEventListener('click', () => ouvrirModal(false))
  document.getElementById('btn-annuler-fil').addEventListener('click', () => { modal.style.display = 'none' })

  document.getElementById('btn-confirmer-fil').addEventListener('click', async () => {
    errModal.style.display = 'none'
    const idFiliation = document.getElementById('fil-type').value
    if (!idFiliation) { errModal.textContent = 'Choisissez un type de lien.'; errModal.style.display = 'block'; return }

    try {
      if (_modeEdit) {
        await api.put(`/filiations/${_idEnCours}`, { idFiliation })
      } else {
        const nom = document.getElementById('fil-nom').value.trim()
        const prenom = document.getElementById('fil-prenom').value.trim()
        if (!nom || !prenom) { errModal.textContent = 'Nom et prénom sont obligatoires.'; errModal.style.display = 'block'; return }
        const fd = new FormData()
        fd.append('numAdherent', ctx.numAdherent)
        fd.append('idFiliation', idFiliation)
        fd.append('nom', nom)
        fd.append('prenom', prenom)
        const ddn = document.getElementById('fil-ddn').value
        if (ddn) fd.append('dateNaissance', ddn)
        const sexe = document.getElementById('fil-sexe').value
        if (sexe) fd.append('sexe', sexe)
        const telNum = document.getElementById('fil-tel').value.trim()
        if (telNum) fd.append('telephone', _indicatif + telNum)
        const email = document.getElementById('fil-email').value.trim()
        if (email) fd.append('email', email)
        const photoFile = document.getElementById('fil-photo').files[0]
        if (photoFile) fd.append('photo', photoFile)
        await api.upload('/filiations', fd)
      }
      modal.style.display = 'none'
      charger()
      rafraichirHistorique('historique-container')
    } catch(e) { errModal.textContent = e.message; errModal.style.display = 'block' }
  })

  charger()
  buildHistorique('historique-container', 50, 'filiation')
</script>
</body>
</html>
