<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Messages système</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Code ou texte du message..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Messages système</div>
        <div class="page-subtitle">165 messages · FR / EN / MG (gpotb39)</div>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost filtre-lang active" data-lang="">Toutes</button>
        <button class="btn btn-ghost filtre-lang" data-lang="fr">FR</button>
        <button class="btn btn-ghost filtre-lang" data-lang="en">EN</button>
        <button class="btn btn-ghost filtre-lang" data-lang="mg">MG</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Langue</th>
              <th>Type</th>
              <th>Message</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-messages">
            <tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);" id="pagination-info"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal édition message -->
<div class="modal-overlay" id="modal-msg" style="display:none;">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <span class="modal-title">Modifier le message</span>
      <button class="modal-close" id="modal-msg-close">&times;</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--bg);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;">
        <strong id="msg-code-display"></strong> · <span id="msg-lang-display"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Message *</label>
        <textarea class="form-input" id="msg-libelle" rows="4"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-msg-cancel">Annuler</button>
      <button class="btn btn-primary" id="btn-sauvegarder-msg">Sauvegarder</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/admin/messages')

  let page = 0, totalPages = 1, filtreLang = '', msgActif = null

  async function charger() {
    const q = document.getElementById('search-input').value
    const params = new URLSearchParams({ page, size: 30 })
    if (q) params.set('q', q)
    if (filtreLang) params.set('langue', filtreLang)
    const tbody = document.getElementById('tbody-messages')
    tbody.innerHTML = `<tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const data = await api.get(`/admin/messages?${params}`)
      const items = Array.isArray(data) ? data : (data.content || [])
      totalPages = data.totalPages || 1
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Aucun message</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(m => `
        <tr>
          <td style="font-family:monospace;font-size:12px;font-weight:600;">${m.codeMessage||'—'}</td>
          <td><span class="badge badge-info">${(m.codeLangue||'').toUpperCase()}</span></td>
          <td style="font-size:12px;"><span class="badge badge-secondary">${m.typeMessage||'—'}</span></td>
          <td style="font-size:13px; max-width:320px;">${m.libelleMessage||'—'}</td>
          <td>
            ${perm.peutEcrire ? `<button class="btn btn-ghost btn-sm" onclick="editer(${m.id},'${m.codeMessage}','${m.codeLangue}',${JSON.stringify(m.libelleMessage||'').replace(/"/g,'&quot;')})">Modifier</button>` : ''}
          </td>
        </tr>
      `).join('')
      document.getElementById('pagination-info').textContent = `Page ${page+1} / ${totalPages}`
      document.getElementById('pagination-btns').innerHTML = `
        <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
        <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="5" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  window.changerPage = n => { page = n; charger() }

  window.editer = (id, code, lang, libelle) => {
    msgActif = { id, code, lang }
    document.getElementById('msg-code-display').textContent = code
    document.getElementById('msg-lang-display').textContent = lang.toUpperCase()
    document.getElementById('msg-libelle').value = libelle
    document.getElementById('modal-msg').style.display = 'flex'
  }

  document.getElementById('modal-msg-close').addEventListener('click', () => { document.getElementById('modal-msg').style.display = 'none' })
  document.getElementById('modal-msg-cancel').addEventListener('click', () => { document.getElementById('modal-msg').style.display = 'none' })

  document.getElementById('btn-sauvegarder-msg').addEventListener('click', async () => {
    try {
      await api.put(`/admin/messages/${msgActif.id}`, { libelleMessage: document.getElementById('msg-libelle').value })
      toast.success('Message mis à jour.')
      document.getElementById('modal-msg').style.display = 'none'
      charger()
    } catch(err) { toast.error(err.message) }
  })

  document.querySelectorAll('.filtre-lang').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filtre-lang').forEach(b => b.className = 'btn btn-ghost filtre-lang')
      btn.className = 'btn btn-secondary filtre-lang active'
      filtreLang = btn.dataset.lang
      page = 0; charger()
    })
  })

  let t; document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(() => { page=0; charger() }, 400)
  })

  charger()
  buildHistorique('historique-container', 50, 'message')
</script>
</body>
</html>
