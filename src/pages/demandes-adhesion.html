<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Demandes d'adhésion</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info">
          <div class="topbar-user-name" id="topbar-name"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Demandes d'adhésion</div>
        <div class="page-subtitle">Gérer les demandes en attente de validation</div>
      </div>
      <button class="btn btn-outline btn-print" onclick="window.print()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>

    <!-- Filtres statut -->
    <div style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;">
      <button class="btn btn-secondary filtre-btn active" data-filtre="">Toutes</button>
      <button class="btn btn-ghost filtre-btn" data-filtre="EN_ATTENTE">En attente</button>
      <button class="btn btn-ghost filtre-btn" data-filtre="APPROUVE">Approuvées</button>
      <button class="btn btn-ghost filtre-btn" data-filtre="PAIEMENT_A_VERIFIER">Paiement à vérifier</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Demandeur</th>
              <th>Email</th>
              <th>Date demande</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-demandes">
            <tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span class="text-muted" id="pagination-info" style="font-size:13px;"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal détail -->
<div class="modal-overlay" id="modal-detail" style="display:none;">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Détail de la demande</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer" style="display:none;">
      <button class="btn btn-secondary" id="btn-rejeter">Rejeter</button>
      <button class="btn btn-primary" id="btn-approuver">Approuver</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const navUrl = sessionStorage.getItem('lastNavUrl') || '/adherents/demandes'
  const perm = getPermission(navUrl)

  let toutesLesDemandes = [], filtreActif = '', demandeActive = null

  async function charger() {
    const tbody = document.getElementById('tbody-demandes')
    tbody.innerHTML = `<tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>`

    try {
      const data = await api.get(`/adhesions/organisation/${ctx.orgId}`)
      toutesLesDemandes = Array.isArray(data) ? data : (data.content || [])
      afficher()
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="5" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  function afficher() {
    const q = document.getElementById('search-input').value.toLowerCase()
    let items = toutesLesDemandes
    if (filtreActif === 'PAIEMENT_A_VERIFIER')
      items = items.filter(d => d.statut === 'APPROUVE' && d.refPaiementEntree && d.droitEntreePaye !== true)
    else if (filtreActif === 'APPROUVE')
      items = items.filter(d => d.statut === 'APPROUVE')
    else if (filtreActif)
      items = items.filter(d => d.statut === filtreActif)
    if (q) items = items.filter(d => {
      const nom = `${d.demandeur?.prenPersonne || ''} ${d.demandeur?.nomPersonne || ''}`.toLowerCase()
      const email = (d.demandeur?.emailPersonne || '').toLowerCase()
      return nom.includes(q) || email.includes(q)
    })

    const tbody = document.getElementById('tbody-demandes')
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>Aucune demande</p></div></td></tr>`
      document.getElementById('pagination-info').textContent = ''
      document.getElementById('pagination-btns').innerHTML = ''
      return
    }

    tbody.innerHTML = items.map(d => {
      const refDeclaree = d.droitEntreePaye === true
        ? `<div style="font-size:11px;color:#16a34a;margin-top:2px;display:flex;align-items:center;gap:3px;"><svg width="11" height="11" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Paiement confirmé</div>`
        : d.refPaiementEntree
          ? `<div style="font-size:11px;color:var(--primary);margin-top:2px;">Réf. déclarée</div>`
          : ''
      return `<tr>
        <td>
          <div style="font-weight:600;">${d.demandeur?.prenPersonne || ''} ${d.demandeur?.nomPersonne || ''}</div>
        </td>
        <td style="font-size:13px;color:var(--text-muted);">${d.demandeur?.emailPersonne || '—'}</td>
        <td style="font-size:13px;">${d.dateDemandeAdhesion ? new Date(d.dateDemandeAdhesion).toLocaleDateString('fr-FR') : '—'}</td>
        <td>${badge(d.statut)}${refDeclaree}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="voirDetail('${d.idAdhesion}', '${d.statut}')">Voir</button></td>
      </tr>`
    }).join('')

    document.getElementById('pagination-info').textContent = `${items.length} demande${items.length > 1 ? 's' : ''}`
    document.getElementById('pagination-btns').innerHTML = ''
  }

  function badge(s) {
    const m = { EN_ATTENTE: 'badge-warning', APPROUVE: 'badge-success', REFUSE: 'badge-danger' }
    const l = { EN_ATTENTE: 'En attente', APPROUVE: 'Approuvée', REFUSE: 'Refusée' }
    return `<span class="badge ${m[s] || 'badge-secondary'}">${l[s] || s || '—'}</span>`
  }

  function paginationBtns() {
    document.getElementById('pagination-btns').innerHTML = `
      <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
      <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
  }
  window.changerPage = n => { page = n; charger() }

  window.voirDetail = async (id, statut) => {
    demandeActive = { id, statut }
    document.getElementById('modal-detail').style.display = 'flex'
    document.getElementById('modal-body').innerHTML = `<div class="page-loader"><div class="spinner"></div></div>`
    document.getElementById('modal-footer').style.display = 'none'

    try {
      const d = await api.get(`/adhesions/${id}`)
      const orgInfos = await api.get(`/organisations/${ctx.orgId}/infos`).catch(() => ({}))
      const montantEntree = orgInfos.montantEntree || 0
      const devise = orgInfos.devise || 'XOF'
      const droitPaye = d.droitEntreePaye === true
      const refPaiement = d.refPaiementEntree || ''

      const bandeauDroit = montantEntree > 0 ? `
        <div style="background:${droitPaye ? '#dcfce7' : '#fef9c3'};border:1px solid ${droitPaye ? '#86efac' : '#fde047'};border-radius:8px;padding:12px 14px;margin-bottom:16px;">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:${droitPaye ? '#166534' : '#854d0e'};">
            ${droitPaye
            ? `<span style="display:inline-flex;align-items:center;gap:6px;"><svg width="14" height="14" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Droit d'entrée confirmé</span>`
            : `<span style="display:inline-flex;align-items:center;gap:6px;"><svg width="14" height="14" fill="none" stroke="#854d0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Droit d'entrée requis : ${montantEntree.toLocaleString('fr-FR')} ${devise}</span>`
          }
          </div>
          ${refPaiement ? `<div style="font-size:12px;color:var(--text-muted);">Référence déclarée : <strong>${refPaiement}</strong></div>` : (!droitPaye ? `<div style="font-size:12px;color:var(--text-muted);">Aucune référence déclarée par le candidat.</div>` : '')}
          ${!droitPaye && refPaiement && perm.peutEcrire ? `
            <label style="display:flex;align-items:flex-start;gap:8px;margin-top:10px;cursor:pointer;font-size:12.5px;color:var(--text);">
              <input type="checkbox" id="chk-verif-${id}" style="margin-top:2px;width:15px;height:15px;cursor:pointer;accent-color:var(--primary);" onchange="document.getElementById('btn-confirmer-${id}').disabled=!this.checked"/>
              <span>J'ai vérifié le paiement de <strong>${refPaiement}</strong> sur mon application et je confirme l'avoir reçu.</span>
            </label>
            <button class="btn btn-sm btn-primary" id="btn-confirmer-${id}" style="margin-top:8px;" disabled onclick="confirmerDroitEntree('${id}')">Confirmer réception du paiement</button>
          ` : (!droitPaye && perm.peutEcrire ? `
            <p style="font-size:12px;color:var(--text-muted);margin-top:8px;font-style:italic;">En attente de la déclaration du candidat.</p>
          ` : '')}
        </div>` : ''

      document.getElementById('modal-body').innerHTML = `
        ${d.urlPhotoDemandeur ? `<div style="text-align:center;margin-bottom:16px;"><img src="${d.urlPhotoDemandeur}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--border);"></div>` : ''}
        ${bandeauDroit}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
          ${champ('Nom complet', `${d.prenomDemandeur || ''} ${d.nomDemandeur || ''}`)}
          ${champ('Email', d.emailDemandeur)}
          ${champ('Date demande', d.dateDemandeAdhesion ? new Date(d.dateDemandeAdhesion).toLocaleDateString('fr-FR') : '—')}
          ${champ('Statut', d.statut)}
        </div>
        ${d.urlCni ? `<div style="margin-top:8px;"><a href="${d.urlCni}" target="_blank" class="btn btn-ghost btn-sm">Voir pièce d'identité</a></div>` : ''}
      `
      if (statut === 'EN_ATTENTE' && perm.peutEcrire) {
        document.getElementById('modal-footer').style.display = 'flex'
        document.getElementById('btn-approuver').disabled = false
        document.getElementById('btn-approuver').title = ''
        document.getElementById('btn-approuver').onclick = () => {
          const btn = document.getElementById('btn-approuver')
          if (btn.disabled) return
          const nom = `${d.prenomDemandeur || ''} ${d.nomDemandeur || ''}`.trim() || 'ce membre'
          if (confirm(`Approuver la demande de ${nom} ?\n\nCette action créera son compte membre et lui enverra un email de bienvenue.`)) {
            btn.disabled = true
            document.getElementById('btn-rejeter').disabled = true
            decider('APPROUVER')
          }
        }
        document.getElementById('btn-rejeter').onclick = () => {
          const btn = document.getElementById('btn-rejeter')
          if (btn.disabled) return
          const nom = `${d.prenomDemandeur || ''} ${d.nomDemandeur || ''}`.trim() || 'ce membre'
          if (confirm(`Rejeter la demande de ${nom} ?\n\nLe candidat sera notifié par email.`)) {
            btn.disabled = true
            document.getElementById('btn-approuver').disabled = true
            decider('REJETER')
          }
        }
      }
    } catch(err) {
      document.getElementById('modal-body').innerHTML = `<p style="color:#b91c1c;">Erreur : ${err.message}</p>`
    }
  }

  window.confirmerDroitEntree = async (id) => {
    if (!confirm('Confirmer la réception du paiement du droit d\'entrée pour ce candidat ?')) return
    try {
      await api.put(`/adhesions/${id}/confirmer-droit-entree`, {})
      toast.success('Paiement confirmé.')
      document.getElementById('modal-detail').style.display = 'none'
      resetFiltre()
      charger()
    } catch(err) {
      toast.error(err.message)
    }
  }

  function resetFiltre() {
    filtreActif = ''
    document.querySelectorAll('.filtre-btn').forEach(b => { b.className = 'btn btn-ghost filtre-btn' })
    const btnTous = document.querySelector('.filtre-btn[data-filtre=""]')
    if (btnTous) btnTous.className = 'btn btn-secondary filtre-btn active'
  }

  async function decider(action) {
    const endpoint = action === 'APPROUVER' ? 'approuver' : 'rejeter'
    const btnApprouver = document.getElementById('btn-approuver')
    const btnRejeter = document.getElementById('btn-rejeter')
    btnApprouver.disabled = true
    btnRejeter.disabled = true
    btnApprouver.textContent = action === 'APPROUVER' ? 'En cours...' : 'Approuver'
    btnRejeter.textContent = action === 'REJETER' ? 'En cours...' : 'Rejeter'
    try {
      await api.put(`/adhesions/${demandeActive.id}/${endpoint}`, {})
      toast.success(action === 'APPROUVER' ? 'Demande approuvée !' : 'Demande rejetée.')
      document.getElementById('modal-detail').style.display = 'none'
      resetFiltre()
      charger()
    } catch(err) {
      toast.error(err.message)
      btnApprouver.disabled = false
      btnRejeter.disabled = false
      btnApprouver.textContent = 'Approuver'
      btnRejeter.textContent = 'Rejeter'
    }
  }

  function champ(l, v) {
    return `<div style="background:var(--bg);border-radius:8px;padding:10px 12px;">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;">${l}</div>
      <div style="font-size:13.5px;font-weight:600;">${v || '—'}</div>
    </div>`
  }

  // Filtres boutons
  document.querySelectorAll('.filtre-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filtre-btn').forEach(b => { b.className = 'btn btn-ghost filtre-btn' })
      btn.className = 'btn btn-secondary filtre-btn active'
      filtreActif = btn.dataset.filtre
      afficher()
    })
  })

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-detail').style.display = 'none'
  })

  let t; document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(() => afficher(), 300)
  })

  charger()
  buildHistorique('historique-container', 50, 'adhésion', { orgId: ctx.orgId })
</script>
</body>
</html>
