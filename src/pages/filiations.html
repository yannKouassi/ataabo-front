<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Filiations</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="N° adhérent..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Filiations</div>
      <div class="page-subtitle">Liens de parenté et filiations des adhérents</div>
    </div>

    <!-- Recherche par adhérent -->
    <div class="card" style="padding:16px; margin-bottom:20px;">
      <div style="display:flex; gap:12px; align-items:center;">
        <input type="text" class="form-input" id="num-adherent-input" placeholder="Entrez le N° adhérent (ex: ORG01-AB12)" style="flex:1; max-width:360px;"/>
        <button class="btn btn-primary" id="btn-rechercher">Rechercher</button>
      </div>
    </div>

    <div id="zone-filiations" style="display:none;">
      <div class="card">
        <div style="padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
          <span style="font-weight:700; font-size:14px;" id="titre-adherent">Filiations de</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Type de lien</th>
                <th>Nom & prénom</th>
                <th>Sexe</th>
                <th>Date naissance</th>
                <th>Téléphone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tbody-filiations">
              <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="zone-vide" style="text-align:center; padding:60px; color:var(--text-muted);">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px; opacity:.3; display:block;">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <p>Entrez un N° adhérent pour voir ses filiations</p>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- MODAL MODIFIER TYPE DE LIEN -->
<div id="modal-modifier" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
  <div class="card" style="width:100%;max-width:400px;padding:28px;position:relative;">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;">Modifier le type de lien</div>
    <div id="err-modal-fil" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>
    <div class="form-group">
      <label class="form-label">Type de lien *</label>
      <select class="form-input" id="modal-fil-type"></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-secondary" id="btn-annuler-modal">Annuler</button>
      <button class="btn btn-primary" id="btn-confirmer-modal">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/adherents/filiation')

  async function chercher() {
    const num = document.getElementById('num-adherent-input').value.trim()
    if (!num) return

    document.getElementById('zone-vide').style.display = 'none'
    document.getElementById('zone-filiations').style.display = 'block'
    document.getElementById('titre-adherent').textContent = `Filiations de ${num}`
    const tbody = document.getElementById('tbody-filiations')
    tbody.innerHTML = `<tr><td colspan="4"><div class="page-loader"><div class="spinner"></div></div></td></tr>`

    try {
      const items = await api.get(`/filiations/adherent/${num}`)
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>Aucune filiation trouvée</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(f => {
        const sexe = f.afiliation?.sexe?.libSexe === 'MASCULIN' ? 'M' : f.afiliation?.sexe?.libSexe === 'FEMININ' ? 'F' : '—'
        const ddn  = f.afiliation?.dateNaisPersonne ? new Date(f.afiliation.dateNaisPersonne).toLocaleDateString('fr-FR') : '—'
        return `<tr>
          <td><span class="badge badge-info">${f.filiation?.libelleFiliation || '—'}</span></td>
          <td style="font-weight:600;">${f.afiliation?.prenPersonne||''} ${f.afiliation?.nomPersonne||''}</td>
          <td style="font-size:13px;">${sexe}</td>
          <td style="font-size:13px;">${ddn}</td>
          <td style="font-size:13px;">${f.afiliation?.telPersonne || '—'}</td>
          <td style="text-align:right;white-space:nowrap;">
            ${perm.peutEcrire ? `<button class="btn btn-sm btn-secondary" style="margin-right:6px;" onclick="ouvrirModifier('${f.id}','${f.filiation?.idFiliation||''}')">Modifier</button>` : ''}
            ${perm.peutSupprimer ? `<button class="btn btn-sm" style="color:#b91c1c;background:none;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;font-size:13px;" onclick="supprimer('${f.id}')">Supprimer</button>` : ''}
          </td>
        </tr>`
      }).join('')
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  let _typesCache = []
  let _idEnCours = null

  async function chargerTypes() {
    if (!_typesCache.length)
      _typesCache = await api.get('/filiations/types').catch(() => [])
  }

  window.ouvrirModifier = async (id, idTypeActuel) => {
    _idEnCours = id
    document.getElementById('err-modal-fil').style.display = 'none'
    await chargerTypes()
    document.getElementById('modal-fil-type').innerHTML =
      `<option value="">Choisir le lien</option>` +
      _typesCache.map(t => `<option value="${t.idFiliation}" ${t.idFiliation === idTypeActuel ? 'selected' : ''}>${t.libelleFiliation}</option>`).join('')
    document.getElementById('modal-modifier').style.display = 'flex'
  }

  document.getElementById('btn-annuler-modal').addEventListener('click', () => {
    document.getElementById('modal-modifier').style.display = 'none'
  })

  document.getElementById('btn-confirmer-modal').addEventListener('click', async () => {
    const idFiliation = document.getElementById('modal-fil-type').value
    const err = document.getElementById('err-modal-fil')
    if (!idFiliation) { err.textContent = 'Choisissez un type de lien.'; err.style.display = 'block'; return }
    try {
      await api.put(`/filiations/${_idEnCours}`, { idFiliation })
      document.getElementById('modal-modifier').style.display = 'none'
      toast.success('Filiation modifiée.')
      chercher()
    } catch(e) { err.textContent = e.message; err.style.display = 'block' }
  })

  window.supprimer = async (id) => {
    if (!confirm('Supprimer cette filiation ?')) return
    try {
      await api.delete(`/filiations/${id}`)
      toast.success('Filiation supprimée.')
      chercher()
    } catch(err) {
      toast.error(err.message)
    }
  }

  document.getElementById('btn-rechercher').addEventListener('click', chercher)
  document.getElementById('num-adherent-input').addEventListener('keydown', e => { if (e.key === 'Enter') chercher() })
  buildHistorique('historique-container', 50, 'filiation', { orgId: ctx.orgId })
</script>
</body>
</html>
