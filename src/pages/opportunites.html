<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Opportunités</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info">
          <div class="topbar-name" id="topbar-name"></div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-logout-top" onclick="document.getElementById('btn-logout').click()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Recherche d'opportunités</div>
      <div class="page-subtitle">Découvrez les organisations partenaires et les initiatives disponibles</div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;" id="orgs-grid">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  async function charger() {
    const grid = document.getElementById('orgs-grid')
    try {
      const orgs = await api.get('/organisations/actives')
      if (!orgs || orgs.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p>Aucune organisation disponible pour le moment.</p></div>`
        return
      }
      grid.innerHTML = orgs
        .filter(o => o.id !== ctx.orgId)
        .map(o => `
          <div class="card" style="padding:20px;cursor:default;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
              <div style="width:40px;height:40px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;">
                ${(o.nomOrganisation||o.nom||'?')[0].toUpperCase()}
              </div>
              <div>
                <div style="font-weight:700;font-size:14px;">${o.nomOrganisation || o.nom || '—'}</div>
                <div style="font-size:12px;color:var(--text-muted);">${o.typeOrganisation || ''} · ${o.pays || o.codePays || ''}</div>
              </div>
            </div>
            <div style="font-size:13px;color:var(--text-muted);line-height:1.5;">${(o.description||'Aucune description disponible.').substring(0,120)}${(o.description||'').length>120?'…':''}</div>
            ${o.emailContact||o.emailAssociation ? `<div style="margin-top:12px;font-size:12px;color:var(--text-muted);">📧 ${o.emailContact||o.emailAssociation}</div>` : ''}
          </div>
        `).join('')
      if (!grid.innerHTML.trim() || grid.innerHTML === '') {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p>Vous êtes la seule organisation sur la plateforme pour l'instant.</p></div>`
      }
    } catch(err) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p style="color:#b91c1c;">Erreur : ${err.message}</p></div>`
    }
  }

  charger()
</script>
</body>
</html>
