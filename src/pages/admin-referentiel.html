<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Référentiels</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title" id="page-title">Référentiel</div>
      <div class="page-subtitle" id="page-subtitle">Gestion des valeurs de référence</div>
    </div>

    <div class="card">
      <div style="padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:700; font-size:14px;" id="table-titre">Valeurs</span>
        <button class="btn btn-primary btn-sm" id="btn-ajouter">+ Ajouter</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Libellé</th>
            </tr>
          </thead>
          <tbody id="tbody-ref">
            <tr><td colspan="2"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-ref" style="display:none;">
  <div class="modal" style="max-width:440px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-ref-titre">Nouvelle valeur</span>
      <button class="modal-close" id="modal-ref-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="err-ref" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;"></div>
      <div class="form-group">
        <label class="form-label">Code *</label>
        <input type="text" class="form-input" id="ref-code" placeholder="Ex: ASS"/>
      </div>
      <div class="form-group">
        <label class="form-label">Libellé *</label>
        <input type="text" class="form-input" id="ref-libelle" placeholder="Ex: Association"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-ref-cancel">Annuler</button>
      <button class="btn btn-primary" id="btn-sauvegarder-ref">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildHistorique } from '/src/js/historique.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('topbar-name').textContent = `${user.prenom} ${user.nom}`
  document.getElementById('topbar-avatar').textContent = ((user.prenom?.[0]||'')+(user.nom?.[0]||'')).toUpperCase()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  // Détecter quel référentiel afficher depuis l'URL
  const params = new URLSearchParams(window.location.search)
  const type = params.get('type') || 'types-organisation'

  const config = {
    'types-organisation':        { titre: 'Types d\'organisation',    endpoint: '/referentiel/types-organisation',        codeKey: 'code',                    libKey: 'libelle' },
    'statuts':                   { titre: 'Statuts',                   endpoint: '/referentiel/statuts',                   codeKey: 'codeStatut',              libKey: 'libStatut' },
    'sexe':                      { titre: 'Sexe',                      endpoint: '/referentiel/sexes',                     codeKey: 'id',                      libKey: 'libSexe' },
    'filiation':                 { titre: 'Types de filiation',        endpoint: '/referentiel/filiations',                codeKey: 'idFiliation',             libKey: 'libelleFiliation' },
    'situation-matrimoniale':    { titre: 'Situations matrimoniales',  endpoint: '/referentiel/situations-matrimoniales',  codeKey: 'idSituationMatrimoniale', libKey: 'libSituationMatrimoniale' },
    'types-evenements':          { titre: 'Types d\'événements',       endpoint: '/referentiel/types-evenements',          codeKey: 'code',                    libKey: 'libelle' },
  }

  const cfg = config[type] || config['types-organisation']
  document.getElementById('page-title').textContent = cfg.titre
  document.getElementById('table-titre').textContent = cfg.titre

  // Dériver l'URL de permission depuis le type
  const urlPerm = { 'types-organisation': '/admin/type-organisation', 'statuts': '/admin/statuts', 'sexe': '/admin/sexe', 'filiation': '/admin/filiation', 'situation-matrimoniale': '/admin/situation-matrimoniale', 'types-evenements': '/admin/type-evenements' }
  const perm = getPermission(urlPerm[type] || '/admin/type-organisation')
  if (!perm.peutEcrire) document.getElementById('btn-ajouter').style.display = 'none'

  async function charger() {
    const tbody = document.getElementById('tbody-ref')
    tbody.innerHTML = `<tr><td colspan="2"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const items = await api.get(cfg.endpoint)
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="2"><div class="empty-state"><p>Aucune valeur</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(i => `
        <tr>
          <td style="font-family:monospace;font-weight:600;font-size:13px;">${i[cfg.codeKey]||'—'}</td>
          <td>${i[cfg.libKey]||'—'}</td>
        </tr>
      `).join('')
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="2" style="color:#b91c1c;padding:20px;">Erreur : ${err.message}</td></tr>`
    }
  }

  document.getElementById('btn-ajouter').addEventListener('click', () => {
    document.getElementById('ref-code').value = ''
    document.getElementById('ref-libelle').value = ''
    document.getElementById('err-ref').style.display = 'none'
    document.getElementById('modal-ref').style.display = 'flex'
  })
  document.getElementById('modal-ref-close').addEventListener('click', () => { document.getElementById('modal-ref').style.display = 'none' })
  document.getElementById('modal-ref-cancel').addEventListener('click', () => { document.getElementById('modal-ref').style.display = 'none' })

  document.getElementById('btn-sauvegarder-ref').addEventListener('click', async () => {
    const errEl = document.getElementById('err-ref')
    errEl.style.display = 'none'
    const body = {}
    body[cfg.codeKey] = document.getElementById('ref-code').value
    body[cfg.libKey] = document.getElementById('ref-libelle').value
    try {
      await api.post(cfg.endpoint, body)
      toast.success('Valeur ajoutée.')
      document.getElementById('modal-ref').style.display = 'none'
      charger()
    } catch(err) {
      errEl.textContent = err.message
      errEl.style.display = 'block'
    }
  })

  charger()
  buildHistorique('historique-container')
</script>
</body>
</html>
