<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Adhérents</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher un adhérent..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info">
          <div class="topbar-user-name" id="topbar-name"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Adhérents</div>
        <div class="page-subtitle">Liste des membres de l'organisation</div>
      </div>
      <button class="btn btn-outline btn-print" onclick="window.print()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>

    <!-- Filtres -->
    <div class="card" style="margin-bottom:20px; padding:16px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <select class="form-input" id="filtre-statut" style="width:auto; min-width:160px;">
          <option value="">Tous les statuts</option>
          <option value="ACTIF">Actif</option>
          <option value="INACTIF">Inactif</option>
          <option value="SUSPENDU">Suspendu</option>
        </select>
        <button class="btn btn-secondary" id="btn-filtrer">Filtrer</button>
        <button class="btn btn-ghost" id="btn-reset">Réinitialiser</button>
      </div>
    </div>

    <!-- Tableau -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>N° adhérent</th>
              <th>Nom complet</th>
              <th>Email</th>
              <th>Date d'adhésion</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-adherents">
            <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span class="text-muted" id="pagination-info" style="font-size:13px;"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal détail adhérent -->
<div class="modal-overlay" id="modal-detail" style="display:none;">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <span class="modal-title">Détail adhérent</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error('Non autorisé')
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()

  document.getElementById('topbar-name').textContent = `${user.prenom} ${user.nom}`
  const initiales = (user.prenom?.[0] || '') + (user.nom?.[0] || '')
  document.getElementById('topbar-avatar').textContent = initiales.toUpperCase()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/adherents/liste')

  let page = 0
  const size = 15
  let totalPages = 0

  async function charger() {
    const statut = document.getElementById('filtre-statut').value
    const recherche = document.getElementById('search-input').value

    const params = new URLSearchParams({ page, size })
    if (statut) params.set('statut', statut)
    if (recherche) params.set('q', recherche)

    const tbody = document.getElementById('tbody-adherents')
    tbody.innerHTML = `<tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>`

    try {
      const data = await api.get(`/adherents/organisation/${ctx.orgId}?${params}`)
      totalPages = data.totalPages || 1
      const items = data.content || []

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Aucun adhérent trouvé</p></div></td></tr>`
        document.getElementById('pagination-info').textContent = ''
        document.getElementById('pagination-btns').innerHTML = ''
        return
      }

      tbody.innerHTML = items.map(a => `
        <tr>
          <td><span style="font-family:monospace; font-size:12px;">${a.numAdherent || '—'}</span></td>
          <td>
            <div style="display:flex; align-items:center; gap:10px;">
              <div style="width:32px;height:32px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">
                ${(a.prenom?.[0] || '') + (a.nom?.[0] || '')}
              </div>
              <div>
                <div style="font-weight:600; font-size:13.5px;">${a.prenom} ${a.nom}</div>
              </div>
            </div>
          </td>
          <td style="font-size:13px; color:var(--text-muted);">${a.email || '—'}</td>
          <td style="font-size:13px;">${a.dateAdhesion ? new Date(a.dateAdhesion).toLocaleDateString('fr-FR') : '—'}</td>
          <td>${badgeStatut(a.statut)}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="voirDetail(${a.adhesionId})">Voir</button>
          </td>
        </tr>
      `).join('')

      const debut = page * size + 1
      const fin = Math.min((page + 1) * size, data.totalElements || items.length)
      document.getElementById('pagination-info').textContent = `${debut}–${fin} sur ${data.totalElements || items.length} adhérents`
      afficherPagination()
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:#b91c1c; padding:20px; text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  function badgeStatut(statut) {
    const map = { ACTIF: 'badge-success', INACTIF: 'badge-secondary', SUSPENDU: 'badge-warning', EN_ATTENTE: 'badge-warning' }
    return `<span class="badge ${map[statut] || 'badge-secondary'}">${statut || '—'}</span>`
  }

  function afficherPagination() {
    const btns = document.getElementById('pagination-btns')
    btns.innerHTML = `
      <button class="btn btn-ghost btn-sm" ${page === 0 ? 'disabled' : ''} onclick="changerPage(${page - 1})">←</button>
      <span style="font-size:13px; padding:4px 10px; color:var(--text-muted)">Page ${page + 1} / ${totalPages}</span>
      <button class="btn btn-ghost btn-sm" ${page >= totalPages - 1 ? 'disabled' : ''} onclick="changerPage(${page + 1})">→</button>
    `
  }

  window.changerPage = (n) => { page = n; charger() }

  window.voirDetail = async (id) => {
    document.getElementById('modal-detail').style.display = 'flex'
    document.getElementById('modal-body').innerHTML = `<div class="page-loader"><div class="spinner"></div></div>`
    try {
      const a = await api.get(`/adherents/${id}`)
      document.getElementById('modal-body').innerHTML = `
        <div style="display:flex; flex-direction:column; gap:12px;">
          ${champ('N° adhérent', a.numAdherent)}
          ${champ('Nom', `${a.prenom} ${a.nom}`)}
          ${champ('Email', a.email)}
          ${champ('Date de naissance', a.dateNaissance ? new Date(a.dateNaissance).toLocaleDateString('fr-FR') : '—')}
          ${champ('Sexe', a.libSexe)}
          ${champ('Situation matrimoniale', a.situationMatrimoniale)}
          ${champ('Date d\'adhésion', a.dateAdhesion ? new Date(a.dateAdhesion).toLocaleDateString('fr-FR') : '—')}
          ${champ('Statut', a.statut)}
          ${a.urlPhotoDemandeur ? `<img src="${a.urlPhotoDemandeur}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-top:8px;">` : ''}
        </div>
      `
    } catch (err) {
      document.getElementById('modal-body').innerHTML = `<p style="color:#b91c1c;">Erreur : ${err.message}</p>`
    }
  }

  function champ(label, val) {
    return `
      <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);">${label}</span>
        <span style="font-size:13.5px; font-weight:600;">${val || '—'}</span>
      </div>`
  }

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-detail').style.display = 'none'
  })

  document.getElementById('btn-filtrer').addEventListener('click', () => { page = 0; charger() })
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('filtre-statut').value = ''
    document.getElementById('search-input').value = ''
    page = 0; charger()
  })

  let searchTimer
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(() => { page = 0; charger() }, 400)
  })

  charger()
  buildHistorique('historique-container')
</script>
</body>
</html>
