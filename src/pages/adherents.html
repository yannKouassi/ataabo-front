<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Adhérents</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher un adhérent..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info">
          <div class="topbar-user-name" id="topbar-name"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Adhérents</div>
        <div class="page-subtitle">Liste des membres de l'organisation</div>
      </div>
      <button class="btn btn-outline btn-print" onclick="window.print()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>

    <!-- Filtres -->
    <div class="card" style="margin-bottom:20px; padding:16px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <select class="form-input" id="filtre-statut" style="width:auto; min-width:160px;">
          <option value="">Tous les statuts</option>
          <option value="ACTIF">Actif</option>
          <option value="INACTIF">Inactif</option>
          <option value="SUSPENDU">Suspendu</option>
        </select>
        <button class="btn btn-secondary" id="btn-filtrer">Filtrer</button>
        <button class="btn btn-ghost" id="btn-reset">Réinitialiser</button>
      </div>
    </div>

    <!-- Tableau -->
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>N° adhérent</th>
              <th>Nom complet</th>
              <th>Email</th>
              <th>Date d'adhésion</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody-adherents">
            <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <!-- Pagination -->
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span class="text-muted" id="pagination-info" style="font-size:13px;"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal donner accès -->
<div class="modal-overlay" id="modal-acces" style="display:none;">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <span class="modal-title" id="modal-acces-titre">Donner accès plateforme</span>
      <button class="modal-close" id="modal-acces-close">&times;</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;" id="modal-acces-desc"></div>
      <div class="form-group">
        <label class="form-label">Groupe / Rôle *</label>
        <select class="form-input" id="f-acces-groupe"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-acces-annuler">Annuler</button>
      <button class="btn btn-primary" id="btn-acces-sauvegarder">Confirmer</button>
    </div>
  </div>
</div>

<!-- Modal détail adhérent -->
<div class="modal-overlay" id="modal-detail" style="display:none;">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <span class="modal-title">Détail adhérent</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error('Non autorisé')
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  const initiales = (user.prenom?.[0] || '') + (user.nom?.[0] || '')
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/adherents/liste')
  // Permission pour gérer les accès plateforme (donner/changer groupe)
  const _pa1 = getPermission('/utilisateurs/liste')
  const _pa2 = getPermission('/utilisateurs/groupes')
  const permAcces = {
    peutLire:      _pa1.peutLire      || _pa2.peutLire,
    peutEcrire:    _pa1.peutEcrire    || _pa2.peutEcrire,
    peutSupprimer: _pa1.peutSupprimer || _pa2.peutSupprimer,
  }

  let page = 0
  const size = 15
  let totalPages = 0

  let tousLesAdherents = []

  async function charger() {
    const tbody = document.getElementById('tbody-adherents')
    tbody.innerHTML = `<tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const data = await api.get(`/adherents/organisation/${ctx.orgId}`)
      tousLesAdherents = Array.isArray(data) ? data : (data.content || [])
      afficherFiltres()
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:#b91c1c; padding:20px; text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  function afficherFiltres() {
    const statut = document.getElementById('filtre-statut').value
    const recherche = document.getElementById('search-input').value.toLowerCase().trim()
    const tbody = document.getElementById('tbody-adherents')

    let items = tousLesAdherents
    if (statut) items = items.filter(a => a.statut === statut)
    if (recherche) items = items.filter(a =>
      (a.nom || '').toLowerCase().includes(recherche) ||
      (a.prenom || '').toLowerCase().includes(recherche) ||
      (a.email || '').toLowerCase().includes(recherche) ||
      (a.numAdherent || '').toLowerCase().includes(recherche)
    )

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Aucun adhérent trouvé</p></div></td></tr>`
      document.getElementById('pagination-info').textContent = ''
      document.getElementById('pagination-btns').innerHTML = ''
      return
    }

    const debut = page * size
    const paginees = items.slice(debut, debut + size)
    totalPages = Math.ceil(items.length / size)

    tbody.innerHTML = paginees.map(a => `
      <tr>
        <td><span style="font-family:monospace; font-size:12px;">${a.numAdherent || '—'}</span></td>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;">
              ${(a.prenom?.[0] || '') + (a.nom?.[0] || '')}
            </div>
            <div style="font-weight:600; font-size:13.5px;">${a.prenom || ''} ${a.nom || ''}</div>
          </div>
        </td>
        <td style="font-size:13px; color:var(--text-muted);">${a.email || '—'}</td>
        <td style="font-size:13px;">${a.dateAdhesion ? new Date(a.dateAdhesion).toLocaleDateString('fr-FR') : '—'}</td>
        <td>${badgeStatut(a.statut)}</td>
        <td style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-ghost btn-sm" data-num="${a.numAdherent}" data-action="voir">Voir</button>
          ${permAcces.peutEcrire ? `
          <button class="btn btn-outline btn-sm btn-acces" data-num="${a.numAdherent}" data-nom="${a.prenom || ''} ${a.nom || ''}" data-has="${a.aAcces ? '1' : '0'}" style="font-size:11px;padding:3px 8px;${a.aAcces ? 'color:var(--primary);' : ''}">
            ${a.aAcces ? '✓ Accès' : 'Donner accès'}
          </button>` : (a.aAcces ? `<span class="badge badge-success" style="font-size:11px;">✓ Accès</span>` : '')}
        </td>
      </tr>
    `).join('')

    tbody.querySelectorAll('[data-action="voir"]').forEach(btn => {
      btn.addEventListener('click', () => voirDetail(btn.dataset.num))
    })
    tbody.querySelectorAll('.btn-acces').forEach(btn => {
      btn.addEventListener('click', () => ouvrirModalAcces(btn.dataset.num, btn.dataset.nom, btn.dataset.has === '1'))
    })

    document.getElementById('pagination-info').textContent = `${debut + 1}–${Math.min(debut + size, items.length)} sur ${items.length} adhérents`
    afficherPagination()
  }

  function badgeStatut(statut) {
    const map = { ACTIF: 'badge-success', INACTIF: 'badge-secondary', SUSPENDU: 'badge-warning', EN_ATTENTE: 'badge-warning' }
    return `<span class="badge ${map[statut] || 'badge-secondary'}">${statut || '—'}</span>`
  }

  function afficherPagination() {
    const btns = document.getElementById('pagination-btns')
    btns.innerHTML = `
      <button class="btn btn-ghost btn-sm" ${page === 0 ? 'disabled' : ''} onclick="changerPage(${page - 1})">←</button>
      <span style="font-size:13px; padding:4px 10px; color:var(--text-muted)">Page ${page + 1} / ${totalPages}</span>
      <button class="btn btn-ghost btn-sm" ${page >= totalPages - 1 ? 'disabled' : ''} onclick="changerPage(${page + 1})">→</button>
    `
  }

  window.changerPage = (n) => { page = n; charger() }

  // ── Donner accès plateforme ────────────────────────────────────
  let accesNumAdherent = null

  async function ouvrirModalAcces(numAdherent, nom, aDejaAcces) {
    accesNumAdherent = numAdherent
    document.getElementById('modal-acces-titre').textContent = aDejaAcces ? 'Changer de groupe' : 'Donner accès plateforme'
    document.getElementById('modal-acces-desc').textContent = aDejaAcces
      ? `Modifier le groupe de ${nom}.`
      : `Donner à ${nom} un accès à la plateforme en lui attribuant un groupe.`

    const select = document.getElementById('f-acces-groupe')
    select.innerHTML = `<option value="">Chargement...</option>`
    document.getElementById('modal-acces').style.display = 'flex'

    try {
      const groupes = await api.get('/utilisateurs/groupes')
      select.innerHTML = groupes
        .filter(g => g.codeGroupe !== 'GRP_ADMIN_PLATEFORME')
        .map(g => `<option value="${g.codeGroupe}">${g.libelleGroupe}</option>`)
        .join('')
    } catch(err) {
      select.innerHTML = `<option value="">Erreur chargement</option>`
    }
  }

  document.getElementById('modal-acces-close').addEventListener('click', () => {
    document.getElementById('modal-acces').style.display = 'none'
  })
  document.getElementById('btn-acces-annuler').addEventListener('click', () => {
    document.getElementById('modal-acces').style.display = 'none'
  })
  document.getElementById('btn-acces-sauvegarder').addEventListener('click', async () => {
    const codeGroupe = document.getElementById('f-acces-groupe').value
    if (!codeGroupe) return toast.warning('Sélectionnez un groupe.')
    const btn = document.getElementById('btn-acces-sauvegarder')
    btn.disabled = true; btn.textContent = 'En cours...'
    try {
      await api.put(`/adherents/${accesNumAdherent}/groupe`, { codeGroupe })
      toast.success('Accès attribué !')
      document.getElementById('modal-acces').style.display = 'none'
      charger()
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false; btn.textContent = 'Confirmer'
    }
  })

  window.voirDetail = async (numAdherent) => {
    const a = tousLesAdherents.find(x => x.numAdherent === numAdherent)
    if (!a) return
    document.getElementById('modal-detail').style.display = 'flex'

    // Badge accès plateforme
    const badgeAcces = a.aAcces
      ? `<span class="badge badge-success">✓ Accès plateforme</span>`
      : `<span class="badge badge-secondary">Pas d'accès plateforme</span>`

    // Section groupe
    const groupeSection = a.aAcces
      ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
           <span style="font-size:13px;color:var(--text-muted);">Groupe / Rôle</span>
           <div style="display:flex;align-items:center;gap:8px;">
             <span style="font-size:13.5px;font-weight:600;">${a.libelleGroupe || '—'}</span>
             ${permAcces.peutEcrire ? `<button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px;" onclick="ouvrirModalAcces('${a.numAdherent}','${(a.prenom||'')} ${(a.nom||'')}',true);document.getElementById('modal-detail').style.display='none'">Changer</button>` : ''}
           </div>
         </div>`
      : `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
           <span style="font-size:13px;color:var(--text-muted);">Accès plateforme</span>
           ${permAcces.peutEcrire ? `<button class="btn btn-outline btn-sm" style="font-size:11px;" onclick="ouvrirModalAcces('${a.numAdherent}','${(a.prenom||'')} ${(a.nom||'')}',false);document.getElementById('modal-detail').style.display='none'">Donner accès</button>` : '<span style="font-size:12px;color:var(--text-muted);">Aucun accès</span>'}
         </div>`

    document.getElementById('modal-body').innerHTML = `
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;">
          ${(a.prenom?.[0]||'') + (a.nom?.[0]||'')}
        </div>
        <div>
          <div style="font-weight:700;font-size:15px;">${a.prenom||''} ${a.nom||''}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${a.numAdherent}</div>
          <div style="margin-top:4px;">${badgeAcces}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0;">
        ${champ('Email', a.email)}
        ${champ('Date d\'adhésion', a.dateAdhesion ? new Date(a.dateAdhesion).toLocaleDateString('fr-FR') : '—')}
        ${champ('Statut', a.statut)}
        ${groupeSection}
      </div>
    `
  }

  function champ(label, val) {
    return `
      <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);">${label}</span>
        <span style="font-size:13.5px; font-weight:600;">${val || '—'}</span>
      </div>`
  }

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-detail').style.display = 'none'
  })

  document.getElementById('btn-filtrer').addEventListener('click', () => { page = 0; afficherFiltres() })
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.getElementById('filtre-statut').value = ''
    document.getElementById('search-input').value = ''
    page = 0; afficherFiltres()
  })

  let searchTimer
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(() => { page = 0; afficherFiltres() }, 400)
  })

  charger()
  buildHistorique('historique-container')
</script>
</body>
</html>
