<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Cotisations</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Rechercher un adhérent..."/>
    </div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Cotisations</div>
        <div class="page-subtitle">Suivi des paiements des membres</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline btn-print" onclick="window.print()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimer
        </button>
        <button class="btn btn-primary" id="btn-nouvelle">+ Enregistrer un paiement</button>
      </div>
    </div>

    <!-- Stats rapides -->
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px;">
      <div class="card" style="padding:20px;">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:6px;">Total collecté (mois)</div>
        <div style="font-size:22px; font-weight:800;" id="stat-total">—</div>
      </div>
      <div class="card" style="padding:20px;">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:6px;">Paiements ce mois</div>
        <div style="font-size:22px; font-weight:800;" id="stat-count">—</div>
      </div>
      <div class="card" style="padding:20px;">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:6px;">En retard</div>
        <div style="font-size:22px; font-weight:800; color:#b91c1c;" id="stat-retard">—</div>
      </div>
    </div>

    <!-- Filtres -->
    <div class="card" style="padding:16px; margin-bottom:20px;">
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <select class="form-input" id="filtre-statut" style="width:auto; min-width:150px;">
          <option value="">Tous les statuts</option>
          <option value="PAYE">Payé</option>
          <option value="EN_ATTENTE">En attente</option>
          <option value="EN_RETARD">En retard</option>
        </select>
        <input type="month" class="form-input" id="filtre-mois" style="width:auto;"/>
        <button class="btn btn-secondary" id="btn-filtrer">Filtrer</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Adhérent</th>
              <th>Montant</th>
              <th>Période</th>
              <th>Date paiement</th>
              <th>Mode</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody id="tbody-cotisations">
            <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-top:1px solid var(--border);">
        <span style="font-size:13px; color:var(--text-muted);" id="pagination-info"></span>
        <div style="display:flex; gap:8px;" id="pagination-btns"></div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<!-- Modal nouveau paiement -->
<div class="modal-overlay" id="modal-paiement" style="display:none;">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <span class="modal-title">Enregistrer un paiement</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Adhérent *</label>
        <input type="text" class="form-input" id="f-adherent" placeholder="Nom ou numéro d'adhérent"/>
      </div>
      <div class="form-group">
        <label class="form-label">Montant *</label>
        <input type="number" class="form-input" id="f-montant" placeholder="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Période *</label>
        <input type="month" class="form-input" id="f-periode"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mode de paiement *</label>
        <select class="form-input" id="f-mode">
          <option value="ESPECES">Espèces</option>
          <option value="MOBILE_MONEY">Mobile Money</option>
          <option value="VIREMENT">Virement</option>
          <option value="CHEQUE">Chèque</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Référence</label>
        <input type="text" class="form-input" id="f-reference" placeholder="Optionnel"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-annuler">Annuler</button>
      <button class="btn btn-primary" id="btn-enregistrer">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  // L'admin plateforme n'a pas d'organisation — cette page n'est pas applicable
  if (ctx.orgId === 'PLATEFORME') {
    document.querySelector('.page-content, main, .content-area, [data-page]') ||
    document.body.insertAdjacentHTML('afterbegin',
      '<div style="padding:60px;text-align:center;color:var(--text-muted);font-size:15px;">Cette section est réservée aux administrateurs d\'organisation.</div>')
    document.querySelectorAll('.card, table, .filters-bar').forEach(el => el.style.display = 'none')
  }

  const perm = getPermission('/paiements/cotisations')
  if (!perm.peutEcrire) document.getElementById('btn-nouvelle').style.display = 'none'

  let page = 0, totalPages = 1

  async function charger() {
    const params = new URLSearchParams({ page, size: 20 })
    const s = document.getElementById('filtre-statut').value
    const m = document.getElementById('filtre-mois').value
    const q = document.getElementById('search-input').value
    if (s) params.set('statut', s)
    if (m) params.set('periode', m)
    if (q) params.set('q', q)

    const tbody = document.getElementById('tbody-cotisations')
    tbody.innerHTML = `<tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>`

    try {
      const data = await api.get(`/cotisations/organisation/${ctx.orgId}?${params}`)
      totalPages = data.totalPages || 1
      const items = data.content || []

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>Aucune cotisation</p></div></td></tr>`
        document.getElementById('pagination-info').textContent = ''
        document.getElementById('pagination-btns').innerHTML = ''
        return
      }

      tbody.innerHTML = items.map(c => `
        <tr>
          <td style="font-weight:600;">${c.prenomAdherent || ''} ${c.nomAdherent || ''}</td>
          <td style="font-weight:700;">${formaterMontant(c.montant, ctx.devise)}</td>
          <td style="font-size:13px;">${c.periode || '—'}</td>
          <td style="font-size:13px; color:var(--text-muted);">${c.datePaiement ? new Date(c.datePaiement).toLocaleDateString('fr-FR') : '—'}</td>
          <td style="font-size:12.5px;">${c.modePaiement || '—'}</td>
          <td>${badge(c.statut)}</td>
        </tr>
      `).join('')

      document.getElementById('pagination-info').textContent = `Page ${page+1} / ${totalPages}`
      document.getElementById('pagination-btns').innerHTML = `
        <button class="btn btn-ghost btn-sm" ${page===0?'disabled':''} onclick="changerPage(${page-1})">←</button>
        <button class="btn btn-ghost btn-sm" ${page>=totalPages-1?'disabled':''} onclick="changerPage(${page+1})">→</button>`
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="6" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  async function chargerStats() {
    try {
      const s = await api.get(`/cotisations/stats?orgId=${ctx.orgId}`)
      document.getElementById('stat-total').textContent = formaterMontant(s.totalMois, ctx.devise)
      document.getElementById('stat-count').textContent = s.nombreMois ?? '—'
      document.getElementById('stat-retard').textContent = s.enRetard ?? '—'
    } catch { /* stats optionnelles */ }
  }

  function badge(s) {
    const m = { PAYE:'badge-success', EN_ATTENTE:'badge-warning', EN_RETARD:'badge-danger' }
    return `<span class="badge ${m[s]||'badge-secondary'}">${s||'—'}</span>`
  }

  function formaterMontant(v, devise) {
    if (v == null) return '—'
    return new Intl.NumberFormat('fr-FR').format(v) + ' ' + (devise || 'FCFA')
  }

  window.changerPage = n => { page = n; charger() }

  document.getElementById('btn-filtrer').addEventListener('click', () => { page=0; charger() })

  // Modal paiement
  document.getElementById('btn-nouvelle').addEventListener('click', () => {
    document.getElementById('modal-paiement').style.display = 'flex'
    document.getElementById('f-periode').value = new Date().toISOString().slice(0,7)
  })
  document.getElementById('modal-close').addEventListener('click', () => { document.getElementById('modal-paiement').style.display = 'none' })
  document.getElementById('btn-annuler').addEventListener('click', () => { document.getElementById('modal-paiement').style.display = 'none' })

  document.getElementById('btn-enregistrer').addEventListener('click', async () => {
    const btn = document.getElementById('btn-enregistrer')
    btn.disabled = true; btn.textContent = 'Enregistrement...'
    try {
      await api.post('/cotisations', {
        recherche: document.getElementById('f-adherent').value,
        montant: parseFloat(document.getElementById('f-montant').value),
        periode: document.getElementById('f-periode').value,
        modePaiement: document.getElementById('f-mode').value,
        reference: document.getElementById('f-reference').value || null,
      })
      toast.success('Paiement enregistré !')
      document.getElementById('modal-paiement').style.display = 'none'
      charger(); chargerStats()
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false; btn.textContent = 'Enregistrer'
    }
  })

  let t; document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(t); t = setTimeout(() => { page=0; charger() }, 400)
  })

  charger(); chargerStats()
  buildHistorique('historique-container')
</script>
</body>
</html>
