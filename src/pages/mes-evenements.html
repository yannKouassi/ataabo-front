<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Mes événements</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Mes événements</div>
      <div class="page-subtitle">Les événements auxquels vous participez ou êtes inscrit</div>
    </div>

    <div id="liste-evts" style="display:flex; flex-direction:column; gap:16px;">
      <div class="page-loader"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const container = document.getElementById('liste-evts')

  async function charger() {
    try {
      const items = await api.get(`/evenements/mes-evenements`)
      if (!items || !items.length) {
        container.innerHTML = `<div class="card"><div class="empty-state"><p>Aucun événement pour le moment</p></div></div>`
        return
      }
      container.innerHTML = items.map(e => `
        <div class="card" style="padding:20px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
            <div>
              <div style="font-size:16px; font-weight:700; margin-bottom:4px;">${e.titre||e.libelle||'—'}</div>
              <div style="font-size:13px; color:var(--text-muted);">${e.description||''}</div>
              <div style="margin-top:10px; display:flex; gap:16px; flex-wrap:wrap; font-size:13px;">
                ${e.dateDebut ? `<span>📅 ${new Date(e.dateDebut).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})}</span>` : ''}
                ${e.lieu ? `<span>📍 ${e.lieu}</span>` : ''}
              </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
              <span class="badge ${badgeClass(e.statut)}">${e.statut||'—'}</span>
              <span class="badge badge-secondary">${e.libelleType||'—'}</span>
            </div>
          </div>
        </div>
      `).join('')
    } catch(err) {
      container.innerHTML = `<div class="card" style="padding:20px; color:#b91c1c;">Erreur : ${err.message}</div>`
    }
  }

  function badgeClass(s) {
    const m = { PLANIFIE: 'badge-info', EN_COURS: 'badge-warning', TERMINE: 'badge-success', ANNULE: 'badge-danger' }
    return m[s] || 'badge-secondary'
  }

  charger()
</script>
</body>
</html>
