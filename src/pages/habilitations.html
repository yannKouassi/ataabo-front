<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Habilitations</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <style>
    @media (max-width: 767px) {
      /* Grille groupes/permissions → colonne unique */
      [style*="grid-template-columns:280px 1fr"],
      [style*="grid-template-columns: 280px 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Habilitations</div>
      <div class="page-subtitle">Gérer les groupes d'utilisateurs et leurs permissions</div>
    </div>

    <div style="display:grid; grid-template-columns:280px 1fr; gap:20px; align-items:start;">

      <!-- Liste des groupes -->
      <div class="card">
        <div style="padding:16px; border-bottom:1px solid var(--border); font-weight:700; font-size:14px;">Groupes</div>
        <div id="liste-groupes" style="padding:8px;">
          <div class="page-loader"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Permissions du groupe sélectionné -->
      <div class="card" id="panel-permissions">
        <div style="padding:20px; text-align:center; color:var(--text-muted);">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 12px; opacity:.3;">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <p>Sélectionnez un groupe pour voir ses permissions</p>
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildHistorique } from '/src/js/historique.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/habilitations/droits')

  let groupeActif = null

  async function chargerGroupes() {
    try {
      const groupes = await api.get('/utilisateurs/groupes')
      const el = document.getElementById('liste-groupes')
      if (!groupes.length) {
        el.innerHTML = `<p style="padding:12px; font-size:13px; color:var(--text-muted);">Aucun groupe</p>`
        return
      }
      el.innerHTML = groupes.map(g => `
        <div class="groupe-item" data-id="${g.codeGroupe}" style="padding:10px 12px; border-radius:8px; cursor:pointer; font-size:13.5px; font-weight:500; display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <span>${g.libelleGroupe}</span>
        </div>
      `).join('')

      el.querySelectorAll('.groupe-item').forEach(item => {
        item.addEventListener('click', () => {
          el.querySelectorAll('.groupe-item').forEach(i => i.style.background = '')
          item.style.background = 'var(--primary-light)'
          item.style.color = 'var(--primary)'
          chargerPermissions(item.dataset.id, item.querySelector('span').textContent)
        })
      })
    } catch(err) {
      document.getElementById('liste-groupes').innerHTML = `<p style="color:#b91c1c;padding:12px;font-size:13px;">Erreur</p>`
    }
  }

  async function chargerPermissions(groupeId, libelleGroupe) {
    groupeActif = groupeId
    const panel = document.getElementById('panel-permissions')
    panel.innerHTML = `
      <div style="padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:700; font-size:14px;">${libelleGroupe}</span>
        ${perm.peutEcrire ? `<button class="btn btn-primary btn-sm" id="btn-sauvegarder">Sauvegarder</button>` : ''}
      </div>
      <div id="perms-content" style="padding:16px;">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>`

    try {
      const perms = await api.get(`/utilisateurs/groupes/${groupeId}/permissions`)
      const content = document.getElementById('perms-content')

      if (!perms.length) {
        content.innerHTML = `<p style="color:var(--text-muted);font-size:13px;">Aucune permission configurée pour ce groupe.</p>`
        return
      }

      content.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="border-bottom:2px solid var(--border);">
              <th style="text-align:left;padding:8px 12px;font-weight:600;color:var(--text-muted);">Menu</th>
              <th style="text-align:center;padding:8px;font-weight:600;color:var(--text-muted);width:70px;">Lire</th>
              <th style="text-align:center;padding:8px;font-weight:600;color:var(--text-muted);width:70px;">Écrire</th>
              <th style="text-align:center;padding:8px;font-weight:600;color:var(--text-muted);width:80px;">Supprimer</th>
            </tr>
          </thead>
          <tbody>
            ${perms.map(p => `
              <tr data-menu-id="${p.menuId}" style="border-bottom:1px solid var(--border);">
                <td style="padding:10px 12px;font-weight:500;">${p.menuLibelle}</td>
                <td style="text-align:center;padding:10px;">
                  <input type="checkbox" class="perm-lire" ${p.peutLire ? 'checked' : ''} style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer;"/>
                </td>
                <td style="text-align:center;padding:10px;">
                  <input type="checkbox" class="perm-ecrire" ${p.peutEcrire ? 'checked' : ''} style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer;"/>
                </td>
                <td style="text-align:center;padding:10px;">
                  <input type="checkbox" class="perm-supprimer" ${p.peutSupprimer ? 'checked' : ''} style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer;"/>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`

      document.getElementById('btn-sauvegarder')?.addEventListener('click', async () => {
        const rows = [...content.querySelectorAll('tr[data-menu-id]')]
        try {
          await Promise.all(rows.map(row => {
            const menuId = row.dataset.menuId
            return api.put(`/utilisateurs/groupes/${groupeId}/permissions/${menuId}`, {
              peutLire: row.querySelector('.perm-lire').checked,
              peutEcrire: row.querySelector('.perm-ecrire').checked,
              peutSupprimer: row.querySelector('.perm-supprimer').checked
            })
          }))
          toast.success('Permissions mises à jour ! Les utilisateurs de ce groupe doivent se reconnecter pour voir les changements.')
        } catch(err) {
          toast.error(err.message)
        }
      })
    } catch(err) {
      document.getElementById('perms-content').innerHTML = `<p style="color:#b91c1c;">Erreur : ${err.message}</p>`
    }
  }

  chargerGroupes()
  buildHistorique('historique-container', 50, 'habilitation')
</script>
</body>
</html>
