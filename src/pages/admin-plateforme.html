<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ataabo — Infos plateforme</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="margin-bottom:24px;">
      <div class="page-title">Paramètres plateforme</div>
      <div class="page-subtitle">Informations générales de la plateforme Ataabo</div>
    </div>

    <div class="card" style="max-width:640px; padding:28px;">
      <div id="err-plat" style="background:#fee2e2;color:#b91c1c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;"></div>
      <div id="ok-plat" style="background:#dcfce7;color:#166534;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;"></div>

      <div class="form-group">
        <label class="form-label">Nom de la plateforme</label>
        <input type="text" class="form-input" id="plat-nom" placeholder="Ataabo"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="plat-description" rows="3" placeholder="Description de la plateforme"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">URL du logo</label>
        <input type="text" class="form-input" id="plat-logo" placeholder="https://..."/>
        <div id="plat-logo-preview" style="margin-top:8px;"></div>
      </div>

      <button class="btn btn-primary" id="btn-sauvegarder" style="margin-top:8px;">Sauvegarder</button>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { buildHistorique } from '/src/js/historique.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/admin/plateforme/infos')
  if (!perm.peutEcrire) document.getElementById('btn-sauvegarder').style.display = 'none'

  async function charger() {
    try {
      const p = await api.get('/plateforme')
      document.getElementById('plat-nom').value = p.nom || ''
      document.getElementById('plat-description').value = p.description || ''
      document.getElementById('plat-logo').value = p.urlLogo || ''
      if (p.urlLogo) {
        document.getElementById('plat-logo-preview').innerHTML = `<img src="${p.urlLogo}" style="height:60px;border-radius:8px;object-fit:contain;">`
      }
    } catch(err) {
      document.getElementById('err-plat').textContent = err.message
      document.getElementById('err-plat').style.display = 'block'
    }
  }

  document.getElementById('btn-sauvegarder').addEventListener('click', async () => {
    const errEl = document.getElementById('err-plat')
    const okEl = document.getElementById('ok-plat')
    errEl.style.display = 'none'; okEl.style.display = 'none'
    try {
      await api.put('/plateforme/infos', {
        nom: document.getElementById('plat-nom').value,
        description: document.getElementById('plat-description').value,
      })
      const logo = document.getElementById('plat-logo').value
      if (logo) await api.put('/plateforme/logo', { urlLogo: logo })
      okEl.textContent = 'Plateforme mise à jour avec succès.'
      okEl.style.display = 'block'
    } catch(err) {
      errEl.textContent = err.message
      errEl.style.display = 'block'
    }
  })

  charger()
  buildHistorique('historique-container')
</script>
</body>
</html>
