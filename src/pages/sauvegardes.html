<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/img.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnioNova — Sauvegardes</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sidebar-org-logo"></div>
      <div><div class="sidebar-org-name" id="sidebar-org-name">Organisation</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="nav-item" id="btn-logout">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Déconnexion</span>
      </div>
    </div>
  </aside>
  <header class="topbar">
    <div class="topbar-search" style="visibility:hidden;"></div>
    <div class="topbar-actions">
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <div class="topbar-user-info"><div class="topbar-user-name" id="topbar-name"></div></div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
      <div>
        <div class="page-title">Sauvegardes</div>
        <div class="page-subtitle">Historique des sauvegardes de la base de données</div>
      </div>
      <button class="btn btn-primary" id="btn-sauvegarder">Lancer une sauvegarde</button>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Taille</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody-sauvegardes">
            <tr><td colspan="4"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card" style="margin-top:20px; padding:16px 20px;" id="historique-container"></div>
  </main>
</div>

<script type="module">
  import { requireContexte, getContexte, getUser, logout, applyOrgColor, getPermission } from '/src/js/auth.js'
  import { buildHistorique, rafraichirHistorique } from '/src/js/historique.js'
  import { buildSidebar } from '/src/js/sidebar.js'
  import { api } from '/src/js/api.js'
  import { toast } from '/src/js/toast.js'

  if (!requireContexte()) throw new Error()
  const ctx = getContexte()
  const user = getUser()
  if (ctx.couleurPrimaire) applyOrgColor(ctx.couleurPrimaire)
  buildSidebar()
  document.getElementById('btn-logout').addEventListener('click', () => { if (confirm('Se déconnecter ?')) logout() })

  const perm = getPermission('/sauvegardes')
  if (!perm.peutEcrire) document.getElementById('btn-sauvegarder').style.display = 'none'

  const tbody = document.getElementById('tbody-sauvegardes')

  async function charger() {
    tbody.innerHTML = `<tr><td colspan="4"><div class="page-loader"><div class="spinner"></div></div></td></tr>`
    try {
      const items = await api.get('/admin/sauvegardes')
      if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>Aucune sauvegarde</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(s => `
        <tr>
          <td style="font-size:13px;">${s.dateCreation ? new Date(s.dateCreation).toLocaleString('fr-FR') : '—'}</td>
          <td style="font-size:13px;">${s.taille || '—'}</td>
          <td><span class="badge ${s.statut === 'SUCCESS' ? 'badge-success' : 'badge-danger'}">${s.statut||'—'}</span></td>
          <td>
            ${s.urlFichier ? `<a href="${s.urlFichier}" download class="btn btn-ghost btn-sm">Télécharger</a>` : '—'}
            ${s.message ? `
              <details style="margin-top:4px;">
                <summary style="font-size:11px;color:var(--text-muted);cursor:pointer;">Détail technique</summary>
                <div style="font-size:11px;color:#b91c1c;margin-top:4px;max-width:420px;white-space:pre-wrap;font-family:monospace;">${s.message}</div>
              </details>` : ''}
          </td>
        </tr>
      `).join('')
    } catch(err) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:#b91c1c;padding:20px;text-align:center;">Erreur : ${err.message}</td></tr>`
    }
  }

  document.getElementById('btn-sauvegarder').addEventListener('click', async () => {
    if (!confirm('Lancer une sauvegarde maintenant ?')) return
    const btn = document.getElementById('btn-sauvegarder')
    btn.disabled = true
    btn.textContent = 'Sauvegarde en cours…'
    try {
      const resultat = await api.post('/admin/sauvegardes', {})
      if (resultat.statut === 'SUCCESS') toast.success('Sauvegarde terminée.')
      else toast.error('Échec de la sauvegarde : ' + (resultat.message || 'erreur inconnue'))
      await charger()
      rafraichirHistorique('historique-container')
    } catch(err) {
      toast.error(err.message)
    } finally {
      btn.disabled = false
      btn.textContent = 'Lancer une sauvegarde'
    }
  })

  charger()
  buildHistorique('historique-container', 50, 'sauvegarde', { orgId: ctx.orgId })
</script>
</body>
</html>
